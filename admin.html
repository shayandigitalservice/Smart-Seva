<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSeva Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .tab-btn.active { background: #2563eb; color: white; shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .status-pill { font-size: 0.65rem; padding: 2px 8px; border-radius: 99px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-20 md:w-64 bg-slate-900 text-white flex flex-col transition-all duration-300">
        <div class="p-6 text-center border-b border-slate-800">
            <span class="text-xl font-black tracking-tighter hidden md:inline">SMART<span class="text-blue-500">SEVA</span></span>
            <span class="md:hidden font-black text-blue-500">S</span>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="switchSection('stats')" class="w-full flex items-center p-3 rounded-xl hover:bg-slate-800 transition group">
                <i class="fas fa-chart-line w-6 text-blue-400"></i>
                <span class="hidden md:inline ml-3 font-bold text-sm">Dashboard</span>
            </button>
            <button onclick="switchSection('workers')" class="w-full flex items-center p-3 rounded-xl hover:bg-slate-800 transition">
                <i class="fas fa-user-tie w-6 text-orange-400"></i>
                <span class="hidden md:inline ml-3 font-bold text-sm">Experts</span>
            </button>
            <button onclick="switchSection('bookings')" class="w-full flex items-center p-3 rounded-xl hover:bg-slate-800 transition">
                <i class="fas fa-calendar-check w-6 text-green-400"></i>
                <span class="hidden md:inline ml-3 font-bold text-sm">Bookings</span>
            </button>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <a href="index.html" class="flex items-center p-3 text-red-400 font-bold text-xs uppercase tracking-widest">
                <i class="fas fa-sign-out-alt w-6"></i> <span class="hidden md:inline ml-3">Logout</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-50">
            <h2 id="section-title" class="text-xl font-extrabold text-slate-800">Admin Dashboard</h2>
            <div class="flex items-center space-x-4">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Master Mode</span>
                <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold">A</div>
            </div>
        </header>

        <div class="p-8">
            <div id="stats-section" class="section-content grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass-card p-6 rounded-3xl shadow-sm border-l-4 border-blue-500">
                    <p class="text-slate-400 text-xs font-black uppercase">Active Experts</p>
                    <h3 id="stat-workers" class="text-3xl font-black mt-1">0</h3>
                </div>
                <div class="glass-card p-6 rounded-3xl shadow-sm border-l-4 border-green-500">
                    <p class="text-slate-400 text-xs font-black uppercase">Today's Bookings</p>
                    <h3 id="stat-bookings" class="text-3xl font-black mt-1">0</h3>
                </div>
                <div class="glass-card p-6 rounded-3xl shadow-sm border-l-4 border-orange-500">
                    <p class="text-slate-400 text-xs font-black uppercase">Pending Approval</p>
                    <h3 id="stat-pending" class="text-3xl font-black mt-1">0</h3>
                </div>
            </div>

            <div id="workers-section" class="section-content hidden">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-black uppercase tracking-tighter">Experts Management</h3>
                </div>
                <div id="workerList" class="space-y-4"></div>
            </div>

            <div id="bookings-section" class="section-content hidden">
                <h3 class="text-lg font-black uppercase tracking-tighter mb-6">Live Customer Requests</h3>
                <div id="bookingList" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <script>
        // Password Protection
        const key = prompt("Enter Admin Key:");
        if (key !== "AapkaPassword123") { window.location.href = "index.html"; }

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyDWRwmMzdLlWLhdf6KQL4iQi1VHx7uVwXQ",
            authDomain: "smart-seva-5bef9.firebaseapp.com",
            projectId: "smart-seva-5bef9",
            storageBucket: "smart-seva-5bef9.firebasestorage.app",
            messagingSenderId: "1042547190403",
            appId: "1:1042547190403:web:15ea1659a88bdf3621c9b6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Switch Sections
        function switchSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(`${id}-section`).classList.remove('hidden');
            document.getElementById('section-title').innerText = id.charAt(0).toUpperCase() + id.slice(1) + " Management";
        }

        // --- EXPERTS LOGIC ---
        db.collection("workers").orderBy("createdAt", "desc").onSnapshot(snap => {
            const list = document.getElementById('workerList');
            let pendingCount = 0;
            list.innerHTML = "";
            
            document.getElementById('stat-workers').innerText = snap.size;

            snap.forEach(doc => {
                const w = doc.data();
                const id = doc.id;
                if(w.status === 'pending') pendingCount++;
                
                const statusClass = w.status === 'active' ? 'bg-green-100 text-green-600' : (w.status === 'suspended' ? 'bg-red-100 text-red-600' : 'bg-yellow-100 text-yellow-600');

                list.innerHTML += `
                    <div class="glass-card p-5 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4 transition hover:shadow-md">
                        <div class="flex-1">
                            <div class="flex items-center gap-3">
                                <h4 class="font-bold text-slate-800">${w.name}</h4>
                                <span class="status-pill ${statusClass}">${w.status}</span>
                            </div>
                            <p class="text-xs font-bold text-blue-600">${w.category} | ${w.location}</p>
                            <p class="text-[10px] text-slate-400 mt-1">ID: ${id}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="updateDoc('workers','${id}',{status:'active'})" class="bg-green-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Approve</button>
                            <button onclick="updateDoc('workers','${id}',{status:'suspended'})" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Suspend</button>
                            <button onclick="viewDetails('${w.name}', '${w.phone}', '${w.category}', '${w.location}')" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Check</button>
                            <button onclick="deleteDoc('workers','${id}')" class="text-red-500 p-2 hover:bg-red-50 rounded-lg"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('stat-pending').innerText = pendingCount;
        });

        // --- BOOKINGS LOGIC ---
        db.collection("bookings").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('bookingList');
            list.innerHTML = "";
            document.getElementById('stat-bookings').innerText = snap.size;

            snap.forEach(doc => {
                const b = doc.data();
                const id = doc.id;
                list.innerHTML += `
                    <div class="glass-card p-6 rounded-3xl border-l-8 border-blue-600 shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="bg-blue-100 text-blue-600 text-[10px] font-black px-3 py-1 rounded-full uppercase">${b.service}</span>
                                <span class="text-slate-400 text-[10px] font-bold">${b.timestamp?.toDate().toLocaleString() || 'New Request'}</span>
                            </div>
                            <h4 class="text-xl font-black text-slate-800">${b.customerName}</h4>
                            <p class="text-blue-600 font-extrabold text-sm mb-2 underline"><i class="fas fa-phone-alt"></i> ${b.phone}</p>
                            <div class="bg-slate-50 p-3 rounded-xl text-xs text-slate-500 font-semibold border border-slate-100">
                                <i class="fas fa-map-marker-alt text-red-400 mr-1"></i> ${b.address}
                            </div>
                        </div>
                        <button onclick="deleteDoc('bookings','${id}')" class="mt-4 md:mt-0 bg-green-500 text-white px-6 py-4 rounded-2xl font-black text-xs hover:bg-green-600 shadow-lg">
                            COMPLETE <i class="fas fa-check-circle ml-2"></i>
                        </button>
                    </div>
                `;
            });
        });

        // ACTIONS
        async function updateDoc(col, id, data) { await db.collection(col).doc(id).update(data); }
        async function deleteDoc(col, id) { if(confirm("Confirm Delete?")) await db.collection(col).doc(id).delete(); }
        function viewDetails(n, p, c, l) { alert(`Expert: ${n}\nPhone: ${p}\nJob: ${c}\nLocation: ${l}`); }
    </script>
</body>
</html>
