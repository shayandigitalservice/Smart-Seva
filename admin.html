<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSeva Control Center - Master Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .control-card { background: #ffffff; border-radius: 24px; border: 1px solid #e2e8f0; transition: 0.3s; }
        .nav-btn.active { background: #2563eb; color: #ffffff; }
        .sos-alert-box { animation: alert-pulse 1s infinite; border: 4px solid #ef4444; }
        @keyframes alert-pulse { 
            0% { background: #fee2e2; } 
            50% { background: #fca5a5; } 
            100% { background: #fee2e2; } 
        }
    </style>
</head>
<body class="flex min-h-screen overflow-hidden">

    <audio id="sosAudio" loop>
        <source src="https://www.soundjay.com/buttons/beep-01a.mp3" type="audio/mpeg">
    </audio>

    <aside class="w-64 bg-slate-950 p-6 flex flex-col hidden md:flex">
        <div class="mb-10 px-2">
            <h1 class="text-white font-black text-2xl tracking-tighter italic">SMART<span class="text-blue-500">SEVA</span></h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Master Admin V3.0</p>
        </div>
        <nav class="space-y-3 flex-1">
            <button onclick="showPage('overview')" id="btn-overview" class="nav-btn p-4 rounded-xl font-bold text-slate-400 w-full text-left active"><i class="fas fa-chart-line mr-3"></i> Overview</button>
            <button onclick="showPage('experts')" id="btn-experts" class="nav-btn p-4 rounded-xl font-bold text-slate-400 w-full text-left"><i class="fas fa-user-shield mr-3"></i> Expert Management</button>
            <button onclick="showPage('bookings')" id="btn-bookings" class="nav-btn p-4 rounded-xl font-bold text-slate-400 w-full text-left"><i class="fas fa-calendar-check mr-3"></i> Live Bookings</button>
            <button onclick="showPage('alerts')" id="btn-alerts" class="nav-btn p-4 rounded-xl font-bold text-slate-400 w-full text-left"><i class="fas fa-bell text-red-500 mr-3"></i> SOS Alerts</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 px-8 py-4 flex justify-between items-center">
            <h2 id="page-title" class="text-lg font-black text-slate-800 uppercase tracking-tight">Overview</h2>
            <div id="liveAlertNotify" class="hidden bg-red-100 text-red-600 px-4 py-2 rounded-xl font-black text-[10px] animate-bounce">
                🚨 EMERGENCY SOS ACTIVE
            </div>
        </header>

        <div class="p-8">
            <div id="alerts-page" class="page-content hidden space-y-6">
                <div id="sosContainer" class="grid grid-cols-1 gap-4">
                    <p class="text-slate-400 font-bold">No active emergencies.</p>
                </div>
            </div>

            <div id="overview-page" class="page-content space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="control-card p-6 border-l-4 border-blue-500">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Workers</p>
                        <h3 id="count-workers" class="text-4xl font-black text-slate-800 mt-1">0</h3>
                    </div>
                    <div class="control-card p-6 border-l-4 border-orange-500">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pending Approvals</p>
                        <h3 id="count-pending" class="text-4xl font-black text-orange-600 mt-1">0</h3>
                    </div>
                </div>
            </div>

            <div id="bookings-page" class="page-content hidden space-y-4">
                <div id="bookingContainer" class="space-y-4"></div>
            </div>

            <div id="experts-page" class="page-content hidden space-y-4">
                <div id="expertContainer" class="grid grid-cols-1 gap-4"></div>
            </div>
        </div>
    </main>

    <script>
        const pass = prompt("Master Access Key Required:");
        if(pass !== "AapkaPassword123") { window.location.href = "index.html"; }

        const firebaseConfig = {
            apiKey: "AIzaSyDWRwmMzdLlWLhdf6KQL4iQi1VHx7uVwXQ",
            authDomain: "smart-seva-5bef9.firebaseapp.com",
            projectId: "smart-seva-5bef9",
            storageBucket: "smart-seva-5bef9.firebasestorage.app",
            messagingSenderId: "1042547190403",
            appId: "1:1042547190403:web:15ea1659a88bdf3621c9b6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'bg-blue-600', 'text-white'));
            document.getElementById(`${pageId}-page`).classList.remove('hidden');
            document.getElementById(`btn-${pageId}`).classList.add('active', 'bg-blue-600', 'text-white');
            document.getElementById('page-title').innerText = pageId.toUpperCase();
        }

        // --- 1. LIVE SOS MONITORING ---
        db.collection("alerts").orderBy("timestamp", "desc").onSnapshot(snap => {
            const container = document.getElementById('sosContainer');
            const notify = document.getElementById('liveAlertNotify');
            const audio = document.getElementById('sosAudio');
            
            container.innerHTML = "";
            if (snap.empty) {
                notify.classList.add('hidden');
                audio.pause();
                container.innerHTML = "<p class='font-bold text-slate-300'>No active emergencies.</p>";
                return;
            }

            notify.classList.remove('hidden');
            audio.play();

            snap.forEach(doc => {
                const a = doc.data();
                container.innerHTML += `
                    <div class="sos-alert-box p-8 rounded-[2rem] flex justify-between items-center shadow-2xl">
                        <div>
                            <h3 class="text-2xl font-black text-red-600 uppercase">Emergency SOS</h3>
                            <p class="font-black text-slate-800 text-lg mt-2">${a.userName}</p>
                            <p class="text-sm font-bold text-slate-500">${a.location}</p>
                            <p class="text-[10px] font-black text-red-500 mt-2 uppercase tracking-widest">Phone: ${a.userId}</p>
                        </div>
                        <button onclick="resolveAlert('${doc.id}')" class="bg-red-600 text-white px-8 py-4 rounded-2xl font-black uppercase text-xs">Resolve Issue</button>
                    </div>`;
            });
        });

        async function resolveAlert(id) {
            if(confirm("Is this emergency handled?")) {
                await db.collection("alerts").doc(id).delete();
            }
        }

        // --- 2. BOOKINGS WITH OTP TRACKING ---
        db.collection("bookings").orderBy("timestamp", "desc").onSnapshot(snap => {
            const container = document.getElementById('bookingContainer');
            container.innerHTML = "";
            snap.forEach(doc => {
                const b = doc.data();
                const otp = doc.id.slice(-4).toUpperCase();
                container.innerHTML += `
                    <div class="control-card p-6 border-r-8 border-blue-600 flex justify-between items-center">
                        <div>
                            <span class="text-[9px] font-black bg-blue-100 text-blue-600 px-3 py-1 rounded-full uppercase">${b.service}</span>
                            <h4 class="text-xl font-black text-slate-900 mt-2">${b.customerName}</h4>
                            <p class="text-xs font-bold text-slate-500 italic">Worker: ${b.workerName}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-400 uppercase">Start OTP</p>
                            <p class="text-lg font-black text-blue-600 tracking-widest">${otp}</p>
                            <span class="text-[10px] font-bold text-orange-500 uppercase">${b.status}</span>
                        </div>
                    </div>`;
            });
        });

        // (Other Expert Fetch & Delete logic remains same)
    </script>
</body>
</html>
