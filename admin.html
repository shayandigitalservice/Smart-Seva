<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSeva - Master Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 4px solid #2563eb; color: #2563eb; }
    </style>
</head>
<body class="pb-20">

    <div class="bg-slate-900 text-white p-6 shadow-xl mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic tracking-tighter">SmartSeva Control Center</h1>
            <button onclick="location.reload()" class="bg-slate-800 p-2 rounded-lg hover:bg-slate-700 transition">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>

    <div class="container mx-auto px-4 mb-8">
        <div class="flex space-x-8 border-b border-gray-200 font-bold uppercase text-sm tracking-widest text-gray-400">
            <button onclick="switchTab('workers')" id="tab-workers" class="pb-4 active-tab transition">Worker Requests</button>
            <button onclick="switchTab('bookings')" id="tab-bookings" class="pb-4 transition">Customer Bookings</button>
        </div>
    </div>

    <div class="container mx-auto px-4">
        
        <div id="workers-section" class="tab-content active">
            <div class="grid grid-cols-1 gap-4" id="workerList">
                <p class="text-center py-10 font-bold text-gray-400 italic">Fetching Workers...</p>
            </div>
        </div>

        <div id="bookings-section" class="tab-content">
            <div class="grid grid-cols-1 gap-4" id="bookingList">
                <p class="text-center py-10 font-bold text-gray-400 italic">Fetching Bookings...</p>
            </div>
        </div>

    </div>

    <script>
        // Password Security
        const pass = prompt("Enter Master Key:");
        if (pass !== "AapkaPassword123") { // Yahan apna password set karein
            alert("Wrong Access!");
            window.location.href = "index.html";
        }

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDWRwmMzdLlWLhdf6KQL4iQi1VHx7uVwXQ",
            authDomain: "smart-seva-5bef9.firebaseapp.com",
            projectId: "smart-seva-5bef9",
            storageBucket: "smart-seva-5bef9.firebasestorage.app",
            messagingSenderId: "1042547190403",
            appId: "1:1042547190403:web:15ea1659a88bdf3621c9b6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Tab Switcher
        function switchTab(type) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('button[id^="tab-"]').forEach(b => b.classList.remove('active-tab'));
            
            document.getElementById(`${type}-section`).classList.add('active');
            document.getElementById(`tab-${type}`).classList.add('active-tab');
        }

        // Real-time Workers Fetch
        db.collection("workers").orderBy("createdAt", "desc").onSnapshot(snap => {
            const list = document.getElementById('workerList');
            list.innerHTML = "";
            snap.forEach(doc => {
                const w = doc.data();
                const id = doc.id;
                list.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl shadow-sm flex flex-col md:flex-row justify-between items-center border border-gray-100">
                        <div>
                            <h4 class="text-lg font-black">${w.name} <span class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded ml-2 uppercase">${w.status}</span></h4>
                            <p class="text-sm font-bold text-blue-500">${w.category}</p>
                            <p class="text-xs text-gray-400 font-semibold mt-1">${w.phone} | ${w.location}</p>
                        </div>
                        <div class="flex space-x-2 mt-4 md:mt-0">
                            <button onclick="updateWorker('${id}', 'active')" class="bg-green-600 text-white px-4 py-2 rounded-xl text-xs font-bold">Approve</button>
                            <button onclick="deleteDoc('workers', '${id}')" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl text-xs font-bold"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        });

        // Real-time Bookings Fetch
        db.collection("bookings").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('bookingList');
            list.innerHTML = "";
            snap.forEach(doc => {
                const b = doc.data();
                const id = doc.id;
                list.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl shadow-md border-l-8 border-orange-500 flex flex-col md:flex-row justify-between items-center transition hover:shadow-xl">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="bg-orange-100 text-orange-600 text-[10px] font-black px-2 py-0.5 rounded uppercase">${b.service}</span>
                                <span class="text-gray-300 text-xs">${b.timestamp?.toDate().toLocaleString() || 'Just Now'}</span>
                            </div>
                            <h4 class="text-xl font-black text-slate-800">${b.customerName}</h4>
                            <p class="text-blue-600 font-bold"><i class="fas fa-phone-alt mr-1"></i> ${b.phone}</p>
                            <p class="text-sm text-gray-500 mt-2 bg-gray-50 p-3 rounded-xl border border-dashed border-gray-200"><strong>Address:</strong> ${b.address}</p>
                        </div>
                        <div class="mt-4 md:mt-0 md:ml-6 flex flex-col gap-2">
                            <button onclick="deleteDoc('bookings', '${id}')" class="bg-slate-100 text-slate-400 p-4 rounded-2xl hover:bg-red-50 hover:text-red-500 transition">
                                <i class="fas fa-check-circle text-2xl"></i><br><span class="text-[9px] font-bold">DONE</span>
                            </button>
                        </div>
                    </div>
                `;
            });
        });

        // Database Actions
        async function updateWorker(id, status) {
            await db.collection("workers").doc(id).update({ status: status });
        }

        async function deleteDoc(col, id) {
            if(confirm("Are you sure?")) {
                await db.collection(col).doc(id).delete();
            }
        }
    </script>
</body>
</html>
