<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Portal - SmartSeva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .input-field { background: #ffffff; border: 2px solid #f1f5f9; border-radius: 12px; padding: 12px 16px; outline: none; transition: 0.3s; font-weight: 600; font-size: 0.85rem; width: 100%; color: #1e293b; }
        .input-field:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.05); }
        .label-text { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.05em; }
        .reg-card { border-radius: 2rem; background: #ffffff; box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; }
        .tab-btn { transition: 0.3s; border-bottom: 3px solid transparent; cursor: pointer; }
        .tab-btn.active { border-color: #2563eb; color: #2563eb; }
    </style>
</head>
<body class="min-h-screen py-10 px-4 flex flex-col items-center">

    <div class="max-w-3xl w-full">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-block">
                <div class="bg-blue-600 w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center mx-auto mb-3 text-white text-xl font-black">S</div>
                <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Smart<span class="text-blue-600">Seva</span></h1>
                <p class="text-[9px] font-black text-orange-600 uppercase tracking-[0.3em]">Customer Identity & KYC</p>
            </a>
        </div>

        <div class="reg-card p-8 md:p-12 relative overflow-hidden">
            <div class="flex gap-8 mb-10 border-b border-gray-100">
                <button id="loginTab" onclick="switchTab('login')" class="tab-btn active pb-4 font-bold uppercase text-xs tracking-widest">Login</button>
                <button id="signupTab" onclick="switchTab('signup')" class="tab-btn pb-4 font-bold uppercase text-xs tracking-widest text-gray-400">Register (KYC)</button>
            </div>

            <div id="loginSection">
                <h2 class="text-xl font-black text-slate-900 uppercase mb-6">Welcome Back</h2>
                <form id="customerLoginForm" class="space-y-5">
                    <div>
                        <label class="label-text">Phone Number</label>
                        <input type="tel" id="lPhone" required placeholder="Enter Registered Number" class="input-field">
                    </div>
                    <div>
                        <label class="label-text">Password</label>
                        <input type="password" id="lPass" required placeholder="Enter Password" class="input-field">
                    </div>
                    <div class="flex justify-end">
                        <button type="button" onclick="forgotPassword()" class="text-[10px] font-bold text-blue-600 uppercase tracking-widest hover:underline">Forgot Password?</button>
                    </div>
                    <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase tracking-widest text-xs shadow-xl hover:bg-blue-600 transition-all">
                        Login to Portal
                    </button>
                </form>
            </div>

            <div id="signupSection" class="hidden">
                <h2 class="text-xl font-black text-slate-900 uppercase mb-6 border-b pb-4">Create New Account</h2>
                <form id="customerRegForm" class="space-y-6">
                    <div class="mb-6">
                        <button type="button" onclick="getLocation()" id="gpsBtn" class="w-full bg-blue-50 text-blue-600 py-4 rounded-xl font-black text-[11px] uppercase border-2 border-blue-600/10 hover:bg-blue-600 hover:text-white transition">
                           <i class="fas fa-location-crosshairs mr-2"></i> Detect My Location (Auto-Fill Address)
                        </button>
                        <input type="hidden" id="cCoords">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="label-text">Full Name</label>
                            <input type="text" id="cName" required placeholder="Ex: Muksidul Islam" class="input-field">
                        </div>
                        <div>
                            <label class="label-text">Father's Name</label>
                            <input type="text" id="cFather" required placeholder="Father's Full Name" class="input-field">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="label-text">Gender</label>
                            <select id="cGender" required class="input-field">
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">Phone Number</label>
                            <input type="tel" id="cPhone" required placeholder="+91 XXXXX XXXXX" class="input-field">
                        </div>
                        <div>
                            <label class="label-text">Aadhar Number</label>
                            <input type="number" id="cAadhar" required placeholder="12 Digit Aadhar ID" class="input-field">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="label-text">State</label>
                            <input type="text" id="cState" required placeholder="Auto-filled" class="input-field">
                        </div>
                        <div>
                            <label class="label-text">District</label>
                            <input type="text" id="cDistrict" required placeholder="Auto-filled" class="input-field">
                        </div>
                        <div>
                            <label class="label-text">Pin Code</label>
                            <input type="number" id="cPin" required placeholder="Auto-filled" class="input-field">
                        </div>
                    </div>

                    <div>
                        <label class="label-text">Detailed Address</label>
                        <textarea id="cAddr" required placeholder="Building, Street, Area Name" class="input-field h-20 resize-none"></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="label-text">Near Landmark</label>
                            <input type="text" id="cLandmark" required placeholder="Near Hospital/Bank" class="input-field">
                        </div>
                        <div>
                            <label class="label-text">Set Password</label>
                            <input type="password" id="cPass" required placeholder="Create Secure Password" class="input-field">
                        </div>
                    </div>

                    <button type="submit" id="regBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase tracking-widest text-xs shadow-xl hover:bg-blue-700 transition-all">
                        Verify KYC & Register
                    </button>
                </form>
            </div>
        </div>
        <p class="text-center mt-8 text-[10px] font-bold text-slate-400 uppercase tracking-widest">© 2026 Smart Seva - India's Premium Service Network</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDWRwmMzdLlWLhdf6KQL4iQi1VHx7uVwXQ",
            authDomain: "smart-seva-5bef9.firebaseapp.com",
            projectId: "smart-seva-5bef9",
            storageBucket: "smart-seva-5bef9.firebasestorage.app",
            messagingSenderId: "1042547190403",
            appId: "1:1042547190403:web:15ea1659a88bdf3621c9b6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. Tab Switching
        function switchTab(type) {
            if(type === 'login') {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('signupSection').classList.add('hidden');
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('signupTab').classList.remove('active');
                document.getElementById('signupTab').classList.add('text-gray-400');
            } else {
                document.getElementById('signupSection').classList.remove('hidden');
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('signupTab').classList.add('active');
                document.getElementById('loginTab').classList.remove('active');
                document.getElementById('loginTab').classList.add('text-gray-400');
            }
        }

        // 2. Auto-Address Fetch Logic
        async function fetchAddress(lat, lon) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
                const data = await response.json();
                
                if (data.address) {
                    const addr = data.address;
                    document.getElementById('cState').value = addr.state || "";
                    document.getElementById('cDistrict').value = addr.district || addr.city_district || addr.county || addr.state_district || "";
                    document.getElementById('cPin').value = addr.postcode || "";
                    document.getElementById('cAddr').value = data.display_name || "";
                    document.getElementById('cLandmark').value = addr.suburb || addr.neighbourhood || "";
                }
            } catch (error) {
                alert("GPS Connected but address could not be fetched. Please fill manually.");
            }
        }

        function getLocation() {
            const btn = document.getElementById('gpsBtn');
            btn.innerText = "Detecting Your Location...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (p) => {
                    const lat = p.coords.latitude;
                    const lon = p.coords.longitude;
                    document.getElementById('cCoords').value = `${lat}, ${lon}`;
                    await fetchAddress(lat, lon);
                    btn.innerHTML = `<i class="fas fa-check-circle mr-2"></i> Location Detected & Filled`;
                    btn.classList.add('bg-green-50', 'text-green-600', 'border-green-600/20');
                }, () => { 
                    alert("Please enable GPS/Location permission."); 
                    btn.innerText = "Detect My Location (Auto-Fill Address)";
                });
            }
        }

        // 3. Signup Submission
        document.getElementById('customerRegForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.innerText = "Saving Profile...";
            btn.disabled = true;

            const customerData = {
                name: document.getElementById('cName').value,
                phone: document.getElementById('cPhone').value,
                aadhar: document.getElementById('cAadhar').value,
                password: document.getElementById('cPass').value,
                state: document.getElementById('cState').value,
                district: document.getElementById('cDistrict').value,
                address: document.getElementById('cAddr').value,
                coords: document.getElementById('cCoords').value,
                createdAt: new Date()
            };

            try {
                const check = await db.collection("customers").where("phone", "==", customerData.phone).get();
                if(!check.empty) {
                    alert("Account exists with this number. Please Login.");
                } else {
                    await db.collection("customers").add(customerData);
                    localStorage.setItem("smartSevaUser", JSON.stringify(customerData));
                    alert("Account Verified Successfully!");
                    window.location.href = "index.html";
                }
            } catch (err) { alert(err.message); }
            btn.disabled = false;
        });

        // 4. Login Submission
        document.getElementById('customerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('lPhone').value;
            const pass = document.getElementById('lPass').value;

            const snap = await db.collection("customers").where("phone", "==", phone).where("password", "==", pass).get();
            if (snap.empty) {
                alert("Incorrect Phone or Password.");
            } else {
                localStorage.setItem("smartSevaUser", JSON.stringify(snap.docs[0].data()));
                window.location.href = "index.html";
            }
        });

        function forgotPassword() {
            alert("Please contact SmartSeva support to reset your password.");
        }
    </script>
</body>
</html>
