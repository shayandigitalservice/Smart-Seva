<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Portal - SmartSeva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .input-field { background: #ffffff; border: 2px solid #f1f5f9; border-radius: 12px; padding: 12px 16px; outline: none; transition: 0.3s; font-weight: 600; font-size: 0.85rem; width: 100%; color: #1e293b; }
        .input-field:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.05); }
        .label-text { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.05em; }
        .reg-card { border-radius: 2rem; background: #ffffff; box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; }
        .tab-btn { transition: 0.3s; border-bottom: 3px solid transparent; }
        .tab-btn.active { border-color: #2563eb; color: #2563eb; }
    </style>
</head>
<body class="min-h-screen py-10 px-4 flex flex-col items-center">

    <div class="max-w-3xl w-full">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-block">
                <div class="bg-blue-600 w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center mx-auto mb-3 text-white text-xl font-black">S</div>
                <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Smart<span class="text-blue-600">Seva</span></h1>
                <p class="text-[9px] font-black text-orange-600 uppercase tracking-[0.3em]">Customer Identity & KYC</p>
            </a>
        </div>

        <div class="reg-card p-8 md:p-12 relative overflow-hidden">
            <div class="flex gap-8 mb-10 border-b border-gray-100">
                <button id="loginTab" onclick="switchTab('login')" class="tab-btn active pb-4 font-bold uppercase text-xs tracking-widest">Login</button>
                <button id="signupTab" onclick="switchTab('signup')" class="tab-btn pb-4 font-bold uppercase text-xs tracking-widest text-gray-400">Register (KYC)</button>
            </div>

            <div id="loginSection" class="space-y-6">
                <h2 class="text-xl font-black text-slate-900 uppercase mb-6">Welcome Back</h2>
                <form id="customerLoginForm" class="space-y-5">
                    <div>
                        <label class="label-text">Phone Number</label>
                        <input type="tel" id="lPhone" required placeholder="Registered Mobile Number" class="input-field">
                    </div>
                    <div>
                        <label class="label-text">Password</label>
                        <input type="password" id="lPass" required placeholder="Enter Password" class="input-field">
                    </div>
                    <div class="flex justify-end">
                        <button type="button" onclick="forgotPassword()" class="text-[10px] font-bold text-blue-600 uppercase tracking-widest hover:underline">Forgot Password?</button>
                    </div>
                    <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase tracking-widest text-xs shadow-xl hover:bg-blue-600 transition-all">
                        Login to Portal
                    </button>
                </form>
            </div>

            <div id="signupSection" class="hidden space-y-6">
                <h2 class="text-xl font-black text-slate-900 uppercase mb-6 border-b pb-4">Create Account</h2>
                <form id="customerRegForm" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="label-text">Full Name</label>
                            <input type="text" id="cName" required placeholder="Ex: Muksidul Islam" class="input-field">
                        </div>
                        <div>
                            <label class="label-text">Father's Name</label>
                            <input type="text" id="cFather" required placeholder="Full Name of Father" class="input-field">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="label-text">Gender</label>
                            <select id="cGender" required class="input-field">
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">Phone Number</label>
                            <input type="tel" id="cPhone" required placeholder="+91 XXXXX XXXXX" class="input-field">
                        </div>
                        <div>
                            <label class="label-text">Aadhar Number</label>
                            <input type="number" id="cAadhar" required placeholder="12 Digit ID" class="input-field">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-slate-50 p-4 rounded-xl border-2 border-dashed border-slate-200">
                            <label class="label-text">Aadhar Front Image</label>
                            <input type="file" required accept="image/*" class="text-[10px] font-bold text-slate-400">
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border-2 border-dashed border-slate-200">
                            <label class="label-text">Profile Photo</label>
                            <input type="file" required accept="image/*" class="text-[10px] font-bold text-slate-400">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="label-text">State</label>
                            <select id="cState" required onchange="populateDistricts()" class="input-field">
                                <option value="">Select State</option>
                                <option value="Assam">Assam</option>
                                <option value="Bihar">Bihar</option>
                                <option value="West Bengal">West Bengal</option>
                                <option value="Uttar Pradesh">Uttar Pradesh</option>
                                <option value="Delhi">Delhi</option>
                                </select>
                        </div>
                        <div>
                            <label class="label-text">District</label>
                            <select id="cDistrict" required class="input-field">
                                <option value="">Select District</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">Pin Code</label>
                            <input type="number" id="cPin" required placeholder="XXXXXX" class="input-field">
                        </div>
                    </div>

                    <div>
                        <label class="label-text">Permanent Address</label>
                        <textarea id="cAddr" required placeholder="House No, Colony, Street Name" class="input-field h-20 resize-none"></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="label-text">Landmark</label>
                            <input type="text" id="cLandmark" required placeholder="Near Bank/School" class="input-field">
                        </div>
                        <div>
                            <label class="label-text">Set Password</label>
                            <input type="password" id="cPass" required placeholder="Min 6 characters" class="input-field">
                        </div>
                    </div>

                    <div class="pt-4 flex gap-4">
                        <button type="button" onclick="getLocation()" class="flex-1 bg-blue-50 text-blue-600 py-4 rounded-xl font-black text-[10px] uppercase border-2 border-blue-600/10 hover:bg-blue-600 hover:text-white transition">
                           <i class="fas fa-location-dot mr-1"></i> Detect GPS
                        </button>
                        <input type="hidden" id="cCoords">
                        <button type="submit" id="regBtn" class="flex-[2] bg-blue-600 text-white py-4 rounded-xl font-black uppercase tracking-widest text-xs shadow-xl hover:bg-blue-700 transition-all">
                            Complete Registration
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <p class="text-center mt-8 text-[10px] font-bold text-slate-400 uppercase tracking-widest">© 2026 Smart Seva - Secure Identity Management</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config (Keep your existing config)
        const firebaseConfig = {
            apiKey: "AIzaSyDWRwmMzdLlWLhdf6KQL4iQi1VHx7uVwXQ",
            authDomain: "smart-seva-5bef9.firebaseapp.com",
            projectId: "smart-seva-5bef9",
            storageBucket: "smart-seva-5bef9.firebasestorage.app",
            messagingSenderId: "1042547190403",
            appId: "1:1042547190403:web:15ea1659a88bdf3621c9b6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Switch between Login and Signup
        function switchTab(type) {
            const loginSection = document.getElementById('loginSection');
            const signupSection = document.getElementById('signupSection');
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');

            if(type === 'login') {
                loginSection.classList.remove('hidden');
                signupSection.classList.add('hidden');
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                signupTab.classList.add('text-gray-400');
                loginTab.classList.remove('text-gray-400');
            } else {
                signupSection.classList.remove('hidden');
                loginSection.classList.add('hidden');
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
                loginTab.classList.add('text-gray-400');
                signupTab.classList.remove('text-gray-400');
            }
        }

        // Dynamic District Populate (Sample Data)
        function populateDistricts() {
            const state = document.getElementById('cState').value;
            const distSelect = document.getElementById('cDistrict');
            distSelect.innerHTML = '<option value="">Select District</option>';

            const districtData = {
                "Assam": ["Sonitpur", "Kamrup", "Nagaon", "Dibrugarh", "Jorhat"],
                "West Bengal": ["Kolkata", "Howrah", "Darjeeling", "Hooghly"],
                "Bihar": ["Patna", "Gaya", "Muzaffarpur", "Bhagalpur"],
                "Delhi": ["Central Delhi", "North Delhi", "South Delhi", "West Delhi"],
                "Uttar Pradesh": ["Lucknow", "Kanpur", "Varanasi", "Agra", "Noida"]
            };

            if (districtData[state]) {
                districtData[state].forEach(d => {
                    let opt = document.createElement('option');
                    opt.value = d;
                    opt.innerHTML = d;
                    distSelect.appendChild(opt);
                });
            }
        }

        // GPS Logic
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((p) => {
                    document.getElementById('cCoords').value = `${p.coords.latitude}, ${p.coords.longitude}`;
                    alert("GPS Location Detected Successfully!");
                }, () => { alert("Please grant location permission to continue."); });
            }
        }

        // Forgot Password Logic
        function forgotPassword() {
            const phone = prompt("Please enter your registered phone number to reset password:");
            if (phone) {
                alert("A password reset link has been sent to your registered mobile number / email.");
            }
        }

        // Registration Logic
        document.getElementById('customerRegForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.innerText = "Processing KYC...";
            btn.disabled = true;

            const customerData = {
                name: document.getElementById('cName').value,
                fatherName: document.getElementById('cFather').value,
                phone: document.getElementById('cPhone').value,
                aadhar: document.getElementById('cAadhar').value,
                state: document.getElementById('cState').value,
                district: document.getElementById('cDistrict').value,
                address: document.getElementById('cAddr').value,
                landmark: document.getElementById('cLandmark').value,
                password: document.getElementById('cPass').value,
                coords: document.getElementById('cCoords').value,
                createdAt: new Date(),
                isRegistered: true
            };

            try {
                const check = await db.collection("customers").where("phone", "==", customerData.phone).get();
                if(!check.empty) {
                    alert("This phone number is already registered. Please Login.");
                } else {
                    await db.collection("customers").add(customerData);
                    localStorage.setItem("smartSevaUser", JSON.stringify(customerData));
                    alert("Account Created Successfully!");
                    window.location.href = "index.html";
                }
            } catch (err) { alert("Error: " + err.message); }
            btn.disabled = false;
            btn.innerText = "Complete Registration";
        });

        // Login Logic
        document.getElementById('customerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('lPhone').value;
            const pass = document.getElementById('lPass').value;

            try {
                const snap = await db.collection("customers").where("phone", "==", phone).where("password", "==", pass).get();
                if (snap.empty) {
                    alert("Invalid Credentials. Please check phone/password.");
                } else {
                    localStorage.setItem("smartSevaUser", JSON.stringify(snap.docs[0].data()));
                    alert("Login Successful!");
                    window.location.href = "index.html";
                }
            } catch (err) { alert("Login Error: " + err.message); }
        });
    </script>
</body>
</html>
