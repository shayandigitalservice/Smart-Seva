<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSeva - Final Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .input-field { background: #ffffff; border: 2px solid #f1f5f9; border-radius: 12px; padding: 12px 16px; outline: none; transition: 0.3s; font-weight: 600; font-size: 0.85rem; width: 100%; color: #1e293b; }
        .input-field:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.05); }
        .reg-card { border-radius: 2.5rem; background: #ffffff; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; }
        .tab-btn { transition: 0.3s; border-bottom: 3px solid transparent; cursor: pointer; padding-bottom: 12px; font-weight: 800; text-transform: uppercase; font-size: 11px; color: #94a3b8; }
        .tab-btn.active { border-color: #2563eb; color: #2563eb; }
        #successOverlay { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
    </style>
</head>
<body class="min-h-screen py-10 px-4 flex flex-col items-center">

    <div id="successOverlay">
        <div class="bg-white p-10 rounded-[2.5rem] text-center shadow-2xl">
            <div class="w-16 h-16 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fas fa-check"></i>
            </div>
            <h2 class="text-xl font-black text-slate-900 uppercase">Registered!</h2>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest mt-2">Opening Dashboard...</p>
        </div>
    </div>

    <div class="max-w-2xl w-full">
        <div class="text-center mb-10">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl shadow-xl flex items-center justify-center mx-auto mb-4 text-white text-2xl font-black">S</div>
            <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Smart<span class="text-blue-600">Seva</span></h1>
        </div>

        <div class="reg-card p-8 md:p-12">
            <div class="flex gap-8 mb-10 border-b border-slate-50">
                <button id="loginTab" onclick="switchTab('login')" class="tab-btn active">Login</button>
                <button id="signupTab" onclick="switchTab('signup')" class="tab-btn">Registration</button>
            </div>

            <div id="loginSection">
                <form id="customerLoginForm" class="space-y-6">
                    <input type="tel" id="lPhone" required class="input-field" placeholder="Mobile Number">
                    <input type="password" id="lPass" required maxlength="6" class="input-field" placeholder="6-Digit Password">
                    <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase text-[11px] tracking-widest hover:bg-blue-600 transition-all">Login Now</button>
                </form>
            </div>

            <div id="signupSection" class="hidden space-y-6">
                <form id="customerRegForm" class="space-y-6">
                    <button type="button" onclick="getLocation()" id="gpsBtn" class="w-full bg-blue-50 text-blue-600 py-4 rounded-xl font-black text-[10px] uppercase border-2 border-blue-600/10">
                        <i class="fas fa-location-arrow mr-2"></i> Auto-Detect Address
                    </button>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="cName" placeholder="Full Name" required class="input-field">
                        <input type="tel" id="cPhone" placeholder="Mobile Number" required class="input-field">
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" id="cState" placeholder="State" required class="input-field">
                        <input type="text" id="cDistrict" placeholder="District" required class="input-field">
                        <input type="number" id="cPin" placeholder="PIN" required class="input-field">
                    </div>

                    <textarea id="cAddr" placeholder="Full Address" required class="input-field h-20 resize-none"></textarea>
                    
                    <input type="password" id="cPass" required maxlength="6" minlength="6" placeholder="Set 6-Digit Password" class="input-field border-blue-200">

                    <button type="submit" id="regBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-[11px] tracking-widest shadow-xl shadow-blue-600/20">Register Profile</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        // Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDWRwmMzdLlWLhdf6KQL4iQi1VHx7uVwXQ",
            authDomain: "smart-seva-5bef9.firebaseapp.com",
            databaseURL: "https://smart-seva-5bef9-default-rtdb.firebaseio.com",
            projectId: "smart-seva-5bef9",
            storageBucket: "smart-seva-5bef9.firebasestorage.app",
            messagingSenderId: "1042547190403",
            appId: "1:1042547190403:web:15ea1659a88bdf3621c9b6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function switchTab(type) {
            document.getElementById('loginSection').classList.toggle('hidden', type === 'signup');
            document.getElementById('signupSection').classList.toggle('hidden', type === 'login');
            document.getElementById('loginTab').classList.toggle('active', type === 'login');
            document.getElementById('signupTab').classList.toggle('active', type === 'signup');
        }

        // --- GPS Function ---
        async function getLocation() {
            const btn = document.getElementById('gpsBtn');
            btn.innerText = "Locating...";
            
            if (!navigator.geolocation) {
                alert("GPS not supported by your browser");
                return;
            }

            navigator.geolocation.getCurrentPosition(async (position) => {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${position.coords.latitude}&lon=${position.coords.longitude}`);
                    const data = await res.json();
                    
                    document.getElementById('cState').value = data.address.state || "";
                    document.getElementById('cDistrict').value = data.address.city || data.address.district || data.address.suburb || "";
                    document.getElementById('cPin').value = data.address.postcode || "";
                    document.getElementById('cAddr').value = data.display_name || "";
                    
                    btn.innerHTML = "📍 Location Verified";
                    btn.classList.add('bg-green-500', 'text-white');
                } catch(e) {
                    alert("Error fetching address details");
                    btn.innerText = "Auto-Detect Address";
                }
            }, (err) => {
                alert("GPS Error: " + err.message + ". Please enable location.");
                btn.innerText = "Auto-Detect Address";
            }, { enableHighAccuracy: true });
        }

        // --- Registration Logic ---
        document.getElementById('customerRegForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const phone = document.getElementById('cPhone').value.trim();
            const pass = document.getElementById('cPass').value;

            btn.innerText = "Processing...";
            btn.disabled = true;

            db.ref('customers/' + phone).once('value').then((snap) => {
                if(snap.exists()) {
                    alert("User already exists with this number!");
                    btn.disabled = false;
                    btn.innerText = "Register Profile";
                } else {
                    const userData = {
                        name: document.getElementById('cName').value,
                        phone: phone,
                        password: pass,
                        state: document.getElementById('cState').value,
                        district: document.getElementById('cDistrict').value,
                        pin: document.getElementById('cPin').value,
                        address: document.getElementById('cAddr').value,
                        createdAt: new Date().toISOString()
                    };

                    db.ref('customers/' + phone).set(userData).then(() => {
                        localStorage.setItem("smartSevaUser", JSON.stringify(userData));
                        document.getElementById('successOverlay').style.display = "flex";
                        setTimeout(() => { window.location.href = "customer-dash.html"; }, 1500);
                    });
                }
            }).catch(err => {
                alert("Database Error: " + err.message);
                btn.disabled = false;
            });
        });

        // --- Login Logic ---
        document.getElementById('customerLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const phone = document.getElementById('lPhone').value.trim();
            const pass = document.getElementById('lPass').value;

            db.ref('customers/' + phone).once('value').then((snap) => {
                const user = snap.val();
                if(user && user.password === pass) {
                    localStorage.setItem("smartSevaUser", JSON.stringify(user));
                    document.getElementById('successOverlay').style.display = "flex";
                    setTimeout(() => { window.location.href = "customer-dash.html"; }, 1000);
                } else {
                    alert("Invalid Credentials!");
                }
            });
        });
    </script>
</body>
</html>
