<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Portal| Smart Seva</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .signup-wrapper {
            display: flex;
            width: 100%;
            min-height: 100vh;
            background: #fff;
        }

        /* Left Side Info */
        .signup-side-info {
            flex: 1.2;
            background: linear-gradient(rgba(69, 202, 253, 0.85), rgba(43, 124, 255, 0.8)), 
                        url('https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=1600') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 50px;
            text-align: center;
        }

        /* Right Side Form Area */
        .signup-form-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: #ffffff;
        }

        .signup-card { width: 100%; max-width: 480px; }

        /* Input Styling */
        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: #344054; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-box { position: relative; }
        .input-box i { position: absolute; left: 16px; top: 15px; color: #98a2b3; font-size: 14px; }
        .input-box input, .input-box textarea { 
            width: 100%; padding: 14px 14px 14px 48px; 
            border: 1.5px solid #eaecf0; border-radius: 12px; font-size: 15px; outline: none; transition: 0.3s;
            background: #f9fafb;
        }
        .input-box input:focus { border-color: #45cafd; background: #fff; box-shadow: 0 0 0 4px rgba(69,202,253,0.1); }

        .btn-signup { 
            width: 100%; background: #45cafd; color: white; border: none; 
            padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 800; 
            cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase;
        }
        .btn-signup:hover { background: #2b7cff; transform: translateY(-1px); box-shadow: 0 10px 20px rgba(43, 124, 255, 0.15); }

        /* Tab Switcher */
        .tab-box { display: flex; gap: 20px; border-bottom: 1px solid #f2f4f7; margin-bottom: 30px; }
        .tab-btn { padding: 10px 0; font-size: 14px; font-weight: 700; color: #667085; cursor: pointer; position: relative; border: none; background: none; }
        .tab-btn.active { color: #45cafd; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: #45cafd; }

        #successOverlay { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(16, 24, 40, 0.95); backdrop-filter: blur(8px); align-items: center; justify-content: center; }

        @media (max-width: 900px) {
            .signup-side-info { display: none; }
            .signup-form-area { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="successOverlay">
        <div class="text-center text-white">
            <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-lg">
                <i class="fas fa-check"></i>
            </div>
            <h2 class="text-2xl font-bold">Authenticated!</h2>
            <p class="text-gray-400 mt-2">Accessing Smart Seva....</p>
        </div>
    </div>

    <div class="signup-wrapper">
        <div class="signup-side-info">
            <h1 class="font-extrabold text-5xl mb-6">SHAYAN <span class="text-blue-100 font-light">TOOLS</span></h1>
            <p class="text-lg opacity-90">Tezpur's most advanced digital utility hub. Manage your profile and access professional calculators in one click.</p>
        </div>

        <div class="signup-form-area">
            <div class="signup-card">
                <div class="text-center mb-8">
                    <div class="inline-block relative">
                        <img id="mainLogo" src="1000040753.png" class="h-16 w-16 rounded-2xl shadow-md mb-4 object-cover cursor-pointer" onclick="document.getElementById('logoInput').click()">
                        <input type="file" id="logoInput" class="hidden" accept="image/*" onchange="updateLogo(this)">
                    </div>
                    <h2 class="text-2xl font-bold text-gray-900">Welcome To Smart Seva</h2>
                    <p class="text-gray-500 text-sm mt-1">Please enter your details to continue</p>
                </div>

                <div class="tab-box">
                    <button id="loginTab" onclick="switchTab('login')" class="tab-btn active">LOG IN</button>
                    <button id="signupTab" onclick="switchTab('signup')" class="tab-btn">REGISTER</button>
                </div>

                <div id="loginSection">
                    <form id="customerLoginForm">
                        <div class="input-group">
                            <label>Mobile Number</label>
                            <div class="input-box">
                                <i class="fa-solid fa-phone"></i>
                                <input type="tel" id="lPhone" placeholder="Enter phone number" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Secret Pin</label>
                            <div class="input-box">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="lPass" maxlength="6" placeholder="6-digit pin" required>
                            </div>
                        </div>
                        <button type="submit" class="btn-signup"> Login Dashboard</button>
                    </form>
                </div>

                <div id="signupSection" class="hidden h-[450px] overflow-y-auto pr-2 custom-scroll">
                    <form id="customerRegForm">
                        <button type="button" onclick="getLocation()" id="gpsBtn" class="w-full mb-4 py-3 text-xs font-bold text-blue-500 bg-blue-50 rounded-lg hover:bg-blue-100 transition">
                            <i class="fa-solid fa-location-crosshairs mr-2"></i> AUTO-FILL LOCATION
                        </button>
                        
                        <div class="input-group">
                            <label>Full Name</label>
                            <div class="input-box">
                                <i class="fa-solid fa-user"></i>
                                <input type="text" id="cName" placeholder="Your name" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Father's Name</label>
                            <div class="input-box">
                                <i class="fa-solid fa-user-group"></i>
                                <input type="text" id="fName" placeholder="Father's name" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Mobile</label>
                            <div class="input-box">
                                <i class="fa-solid fa-phone"></i>
                                <input type="tel" id="cPhone" placeholder="10-digit number" required>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="input-group">
                                <label>State</label>
                                <div class="input-box">
                                    <i class="fa-solid fa-map"></i>
                                    <input type="text" id="cState" placeholder="State" required>
                                </div>
                            </div>
                            <div class="input-group">
                                <label>District</label>
                                <div class="input-box">
                                    <i class="fa-solid fa-city"></i>
                                    <input type="text" id="cDistrict" placeholder="District" required>
                                </div>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Permanent Address</label>
                            <div class="input-box">
                                <i class="fa-solid fa-house"></i>
                                <input type="text" id="cAddr" placeholder="Street/Village" required>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="input-group">
                                <label>Pin Code</label>
                                <div class="input-box">
                                    <i class="fa-solid fa-location-pin"></i>
                                    <input type="number" id="cPin" placeholder="784xxx" required>
                                </div>
                            </div>
                            <div class="input-group">
                                <label>Set Pin</label>
                                <div class="input-box">
                                    <i class="fa-solid fa-key"></i>
                                    <input type="password" id="cPass" maxlength="6" placeholder="6-digit" required>
                                </div>
                            </div>
                        </div>

                        <button type="submit" id="regBtn" class="btn-signup">Create Profile</button>
                    </form>
                </div>

                <div class="footer-text text-center mt-6 text-sm text-gray-500">
                    Trusted by developers in <b>Smart Seva</b>.
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDWRwmMzdLlWLhdf6KQL4iQi1VHx7uVwXQ",
            authDomain: "smart-seva-5bef9.firebaseapp.com",
            databaseURL: "https://smart-seva-5bef9-default-rtdb.firebaseio.com",
            projectId: "smart-seva-5bef9",
            storageBucket: "smart-seva-5bef9.firebasestorage.app",
            messagingSenderId: "1042547190403",
            appId: "1:1042547190403:web:15ea1659a88bdf3621c9b6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Logo Persistance
        window.onload = () => {
            const savedLogo = localStorage.getItem('shayanLogo');
            if(savedLogo) document.getElementById('mainLogo').src = savedLogo;
        };

        function updateLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('mainLogo').src = e.target.result;
                    localStorage.setItem('shayanLogo', e.target.result);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function switchTab(type) {
            const isLogin = type === 'login';
            document.getElementById('loginSection').classList.toggle('hidden', !isLogin);
            document.getElementById('signupSection').classList.toggle('hidden', isLogin);
            document.getElementById('loginTab').classList.toggle('active', isLogin);
            document.getElementById('signupTab').classList.toggle('active', !isLogin);
        }

        async function getLocation() {
            const btn = document.getElementById('gpsBtn');
            btn.innerText = "Location Verifying...";
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                const data = await res.json();
                document.getElementById('cState').value = data.address.state || "";
                document.getElementById('cDistrict').value = data.address.district || data.address.city || data.address.town || "";
                document.getElementById('cPin').value = data.address.postcode || "";
                document.getElementById('cAddr').value = data.display_name || "";
                btn.innerText = "LOCATION Verified ✅";
            }, () => { alert("Enable GPS"); btn.innerText = "SYNC FAILED"; });
        }

        // Registration
        document.getElementById('customerRegForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const phone = document.getElementById('cPhone').value.trim();
            const btn = document.getElementById('regBtn');
            btn.innerText = "CREATING...";
            
            const userData = {
                name: document.getElementById('cName').value,
                fatherName: document.getElementById('fName').value,
                phone: phone,
                password: document.getElementById('cPass').value,
                state: document.getElementById('cState').value,
                district: document.getElementById('cDistrict').value,
                pin: document.getElementById('cPin').value,
                address: document.getElementById('cAddr').value,
                createdAt: new Date().toISOString()
            };

            db.ref('customers/' + phone).set(userData).then(() => {
                localStorage.setItem("smartSevaUser", JSON.stringify(userData));
                document.getElementById('successOverlay').style.display = "flex";
                setTimeout(() => { window.location.href = "customer-dash.html"; }, 2000);
            });
        });

        // Login
        document.getElementById('customerLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const phone = document.getElementById('lPhone').value.trim();
            const pass = document.getElementById('lPass').value;
            db.ref('customers/' + phone).once('value').then((snap) => {
                const user = snap.val();
                if(user && user.password === pass) {
                    localStorage.setItem("smartSevaUser", JSON.stringify(user));
                    document.getElementById('successOverlay').style.display = "flex";
                    setTimeout(() => { window.location.href = "customer-dash.html"; }, 1500);
                } else { alert("Invalid Credentials!"); }
            });
        });
    </script>
</body>
</html>
