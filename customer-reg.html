<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSeva | Premium Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #eff6ff, #f8fafc);
            color: #1e293b;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: #64748b;
        }

        .input-field {
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            width: 100%;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            outline: none;
        }

        .btn-primary {
            background: var(--dark);
            color: white;
            padding: 1rem;
            border-radius: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.3);
        }

        .tab-active {
            color: var(--primary);
            position: relative;
        }

        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary);
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="successOverlay" class="hidden fixed inset-0 z-50 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center">
        <div class="bg-white p-12 rounded-[3rem] text-center scale-95 animate-in fade-in zoom-in duration-300">
            <div class="w-20 h-20 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl shadow-green-200">
                <i class="fas fa-check text-3xl"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-slate-900">Success!</h2>
            <p class="text-slate-500 font-medium mt-2">Redirecting to your workspace...</p>
        </div>
    </div>

    <div class="w-full max-w-[500px]">
        <div class="text-center mb-10">
            <div id="logoContainer" class="mb-4 flex justify-center">
                <div onclick="document.getElementById('logoInput').click()" class="w-20 h-20 bg-white rounded-3xl shadow-lg border-2 border-dashed border-slate-200 flex items-center justify-center cursor-pointer overflow-hidden group">
                    <i id="logoIcon" class="fas fa-camera text-slate-300 group-hover:text-blue-500 transition-colors"></i>
                    <img id="logoPreview" class="hidden w-full h-full object-cover">
                </div>
                <input type="file" id="logoInput" class="hidden" accept="image/*" onchange="previewLogo(this)">
            </div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter">SMART<span class="text-blue-600">SEVA</span></h1>
            <p class="text-slate-400 text-sm font-semibold uppercase tracking-widest mt-1">Quality Service Ecosystem</p>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="flex border-b border-slate-100">
                <button id="loginTab" onclick="switchTab('login')" class="flex-1 py-5 text-[11px] font-extrabold uppercase tracking-widest tab-active">Login</button>
                <button id="signupTab" onclick="switchTab('signup')" class="flex-1 py-5 text-[11px] font-extrabold uppercase tracking-widest text-slate-400">Join Now</button>
            </div>

            <div class="p-8 md:p-10">
                <div id="loginSection">
                    <form id="customerLoginForm" class="space-y-6">
                        <div class="input-group">
                            <label>Mobile Connection</label>
                            <input type="tel" id="lPhone" required class="input-field" placeholder="Enter Registered Number">
                        </div>
                        <div class="input-group">
                            <label>Secure Pin</label>
                            <input type="password" id="lPass" required maxlength="6" class="input-field" placeholder="••••••">
                        </div>
                        <button type="submit" class="w-full btn-primary mt-4">Authenticate</button>
                    </form>
                </div>

                <div id="signupSection" class="hidden space-y-6">
                    <form id="customerRegForm" class="space-y-5">
                        <button type="button" onclick="getLocation()" id="gpsBtn" class="w-full py-4 rounded-2xl bg-blue-50 text-blue-600 text-[10px] font-bold uppercase tracking-widest border border-blue-100 hover:bg-blue-100 transition-all">
                            <i class="fas fa-location-arrow mr-2"></i> Sync Current Location
                        </button>
                        
                        <div class="space-y-4">
                            <div class="input-group">
                                <label>Full Name</label>
                                <input type="text" id="cName" required class="input-field" placeholder="Ex: Rahul Sharma">
                            </div>
                            <div class="input-group">
                                <label>Father's Name</label>
                                <input type="text" id="fName" required class="input-field" placeholder="Ex: Mr. Suresh Sharma">
                            </div>
                            <div class="input-group">
                                <label>Active Mobile</label>
                                <input type="tel" id="cPhone" required class="input-field" placeholder="9957XXXXXX">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="input-group">
                                <label>State</label>
                                <input type="text" id="cState" required class="input-field">
                            </div>
                            <div class="input-group">
                                <label>District</label>
                                <input type="text" id="cDistrict" required class="input-field">
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Full Mailing Address</label>
                            <textarea id="cAddr" required class="input-field h-24 resize-none" placeholder="House No, Landmark..."></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="input-group">
                                <label>PIN Code</label>
                                <input type="number" id="cPin" required class="input-field" placeholder="784001">
                            </div>
                            <div class="input-group">
                                <label>6-Digit Pin</label>
                                <input type="password" id="cPass" required maxlength="6" minlength="6" class="input-field" placeholder="123456">
                            </div>
                        </div>

                        <button type="submit" id="regBtn" class="w-full btn-primary mt-4">Create My Profile</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDWRwmMzdLlWLhdf6KQL4iQi1VHx7uVwXQ",
            authDomain: "smart-seva-5bef9.firebaseapp.com",
            databaseURL: "https://smart-seva-5bef9-default-rtdb.firebaseio.com",
            projectId: "smart-seva-5bef9",
            storageBucket: "smart-seva-5bef9.firebasestorage.app",
            messagingSenderId: "1042547190403",
            appId: "1:1042547190403:web:15ea1659a88bdf3621c9b6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function switchTab(type) {
            const isLogin = type === 'login';
            document.getElementById('loginSection').classList.toggle('hidden', !isLogin);
            document.getElementById('signupSection').classList.toggle('hidden', isLogin);
            document.getElementById('loginTab').className = `flex-1 py-5 text-[11px] font-extrabold uppercase tracking-widest ${isLogin ? 'tab-active' : 'text-slate-400'}`;
            document.getElementById('signupTab').className = `flex-1 py-5 text-[11px] font-extrabold uppercase tracking-widest ${!isLogin ? 'tab-active' : 'text-slate-400'}`;
        }

        // Logo Preview Logic
        function previewLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('logoPreview').src = e.target.result;
                    document.getElementById('logoPreview').classList.remove('hidden');
                    document.getElementById('logoIcon').classList.add('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Improved GPS Logic
        async function getLocation() {
            const btn = document.getElementById('gpsBtn');
            btn.innerText = "Connecting Satellite...";
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                    const data = await res.json();
                    const addr = data.address;
                    
                    document.getElementById('cState').value = addr.state || "";
                    // District Detection Improvement
                    document.getElementById('cDistrict').value = addr.district || addr.city || addr.town || addr.county || "";
                    document.getElementById('cPin').value = addr.postcode || "";
                    document.getElementById('cAddr').value = data.display_name || "";
                    
                    btn.innerHTML = "<i class='fas fa-check-circle mr-2'></i> Location Synced";
                    btn.classList.add('bg-green-50', 'text-green-600', 'border-green-100');
                } catch(e) {
                    alert("Network error. Please type manually.");
                    btn.innerText = "Sync Failed";
                }
            }, (err) => {
                alert("Permission Denied. Please enable GPS.");
                btn.innerText = "GPS Disabled";
            }, { enableHighAccuracy: true });
        }

        // Registration Logic
        document.getElementById('customerRegForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const phone = document.getElementById('cPhone').value.trim();
            
            btn.innerText = "Verifying...";
            btn.disabled = true;

            db.ref('customers/' + phone).once('value').then((snap) => {
                if(snap.exists()) {
                    alert("This phone is already registered with an account.");
                    btn.disabled = false;
                    btn.innerText = "Create My Profile";
                } else {
                    const userData = {
                        name: document.getElementById('cName').value,
                        fatherName: document.getElementById('fName').value,
                        phone: phone,
                        password: document.getElementById('cPass').value,
                        state: document.getElementById('cState').value,
                        district: document.getElementById('cDistrict').value,
                        pin: document.getElementById('cPin').value,
                        address: document.getElementById('cAddr').value,
                        createdAt: new Date().toISOString()
                    };

                    db.ref('customers/' + phone).set(userData).then(() => {
                        localStorage.setItem("smartSevaUser", JSON.stringify(userData));
                        document.getElementById('successOverlay').classList.remove('hidden');
                        setTimeout(() => { window.location.href = "customer-dash.html"; }, 2000);
                    });
                }
            });
        });

        // Login Logic
        document.getElementById('customerLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const phone = document.getElementById('lPhone').value.trim();
            const pass = document.getElementById('lPass').value;

            db.ref('customers/' + phone).once('value').then((snap) => {
                const user = snap.val();
                if(user && user.password === pass) {
                    localStorage.setItem("smartSevaUser", JSON.stringify(user));
                    document.getElementById('successOverlay').classList.remove('hidden');
                    setTimeout(() => { window.location.href = "customer-dash.html"; }, 1500);
                } else {
                    alert("Authentication Failed: Invalid Phone or PIN");
                }
            });
        });
    </script>
</body>
</html>
