<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Access | SmartSeva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #ffffff; /* Pure Clean White Background */
            color: #1e293b;
        }

        .input-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 6px;
            display: block;
        }

        .input-flat {
            border-bottom: 2px solid #f1f5f9;
            padding: 12px 0px;
            width: 100%;
            font-weight: 600;
            transition: all 0.3s;
            background: transparent;
        }

        .input-flat:focus {
            outline: none;
            border-color: #2563eb;
        }

        .btn-action {
            background: #2563eb;
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-action:active {
            transform: scale(0.98);
        }

        .tab-minimal {
            font-size: 12px;
            font-weight: 800;
            color: #94a3b8;
            padding: 10px 0;
            position: relative;
            transition: 0.3s;
        }

        .tab-minimal.active {
            color: #2563eb;
        }

        .tab-minimal.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 30px;
            height: 3px;
            background: #2563eb;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen py-12 px-6 flex justify-center">

    <div class="w-full max-w-md">
        <div class="text-center mb-12">
            <div class="relative inline-block">
                <div onclick="document.getElementById('logoInput').click()" class="w-24 h-24 mx-auto mb-4 cursor-pointer">
                    <img id="mainLogo" src="https://cdn-icons-png.flaticon.com/512/10613/10613200.png" class="w-full h-full object-contain rounded-2xl">
                </div>
                <input type="file" id="logoInput" class="hidden" accept="image/*" onchange="updateLogo(this)">
            </div>
            <h1 class="text-2xl font-black tracking-tighter">SMART<span class="text-blue-600">SEVA</span></h1>
        </div>

        <div class="flex gap-8 mb-10 border-b border-slate-100">
            <button id="loginTab" onclick="switchTab('login')" class="tab-minimal active uppercase">Login</button>
            <button id="signupTab" onclick="switchTab('signup')" class="tab-minimal uppercase">Register</button>
        </div>

        <div id="loginSection" class="space-y-8">
            <form id="customerLoginForm">
                <div class="mb-6">
                    <label class="input-label">Mobile Number</label>
                    <input type="tel" id="lPhone" required class="input-flat" placeholder="Enter your number">
                </div>
                <div class="mb-6">
                    <label class="input-label">6-Digit Pin</label>
                    <input type="password" id="lPass" required maxlength="6" class="input-flat" placeholder="••••••">
                </div>
                <button type="submit" class="btn-action">Sign In</button>
            </form>
        </div>

        <div id="signupSection" class="hidden">
            <form id="customerRegForm" class="space-y-6">
                <button type="button" onclick="getLocation()" id="gpsBtn" class="w-full text-left py-4 text-blue-600 text-xs font-bold uppercase tracking-widest border-b border-blue-50">
                    <i class="fas fa-location-crosshairs mr-2"></i> Auto-Fill Location Details
                </button>

                <div class="grid grid-cols-1 gap-6">
                    <div>
                        <label class="input-label">Full Name</label>
                        <input type="text" id="cName" required class="input-flat" placeholder="Type name here">
                    </div>
                    <div>
                        <label class="input-label">Father's Name</label>
                        <input type="text" id="fName" required class="input-flat" placeholder="Father's full name">
                    </div>
                    <div>
                        <label class="input-label">Mobile Number</label>
                        <input type="tel" id="cPhone" required class="input-flat" placeholder="10-digit number">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="input-label">State</label>
                        <input type="text" id="cState" required class="input-flat">
                    </div>
                    <div>
                        <label class="input-label">District</label>
                        <input type="text" id="cDistrict" required class="input-flat">
                    </div>
                </div>

                <div>
                    <label class="input-label">Full Address</label>
                    <input type="text" id="cAddr" required class="input-flat" placeholder="House, Street, Area">
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="input-label">PIN Code</label>
                        <input type="number" id="cPin" required class="input-flat">
                    </div>
                    <div>
                        <label class="input-label">Setup Pin</label>
                        <input type="password" id="cPass" required maxlength="6" class="input-flat" placeholder="123456">
                    </div>
                </div>

                <button type="submit" id="regBtn" class="btn-action">Create Profile</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDWRwmMzdLlWLhdf6KQL4iQi1VHx7uVwXQ",
            authDomain: "smart-seva-5bef9.firebaseapp.com",
            databaseURL: "https://smart-seva-5bef9-default-rtdb.firebaseio.com",
            projectId: "smart-seva-5bef9",
            storageBucket: "smart-seva-5bef9.firebasestorage.app",
            messagingSenderId: "1042547190403",
            appId: "1:1042547190403:web:15ea1659a88bdf3621c9b6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Logo Persistance Logic
        window.onload = function() {
            const savedLogo = localStorage.getItem('smartSevaLogo');
            if(savedLogo) document.getElementById('mainLogo').src = savedLogo;
        }

        function updateLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('mainLogo').src = e.target.result;
                    localStorage.setItem('smartSevaLogo', e.target.result);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function switchTab(type) {
            const isLogin = type === 'login';
            document.getElementById('loginSection').classList.toggle('hidden', !isLogin);
            document.getElementById('signupSection').classList.toggle('hidden', isLogin);
            document.getElementById('loginTab').classList.toggle('active', isLogin);
            document.getElementById('signupTab').classList.toggle('active', !isLogin);
        }

        async function getLocation() {
            const btn = document.getElementById('gpsBtn');
            btn.innerText = "Detecting...";
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                const data = await res.json();
                document.getElementById('cState').value = data.address.state || "";
                document.getElementById('cDistrict').value = data.address.district || data.address.city || data.address.town || "";
                document.getElementById('cPin').value = data.address.postcode || "";
                document.getElementById('cAddr').value = data.display_name || "";
                btn.innerText = "Location Synced ✅";
            }, () => { alert("Turn on GPS"); btn.innerText = "Sync Failed"; });
        }

        document.getElementById('customerRegForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const phone = document.getElementById('cPhone').value.trim();
            const userData = {
                name: document.getElementById('cName').value,
                fatherName: document.getElementById('fName').value,
                phone: phone,
                password: document.getElementById('cPass').value,
                state: document.getElementById('cState').value,
                district: document.getElementById('cDistrict').value,
                pin: document.getElementById('cPin').value,
                address: document.getElementById('cAddr').value,
                createdAt: new Date().toISOString()
            };
            db.ref('customers/' + phone).set(userData).then(() => {
                localStorage.setItem("smartSevaUser", JSON.stringify(userData));
                window.location.href = "customer-dash.html";
            });
        });

        document.getElementById('customerLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const phone = document.getElementById('lPhone').value.trim();
            const pass = document.getElementById('lPass').value;
            db.ref('customers/' + phone).once('value').then((snap) => {
                const user = snap.val();
                if(user && user.password === pass) {
                    localStorage.setItem("smartSevaUser", JSON.stringify(user));
                    window.location.href = "customer-dash.html";
                } else { alert("Invalid login!"); }
            });
        });
    </script>
</body>
</html>
