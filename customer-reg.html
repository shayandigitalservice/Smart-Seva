<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Access - SmartSeva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .input-field { background: #ffffff; border: 2px solid #f1f5f9; border-radius: 12px; padding: 12px 16px; outline: none; transition: 0.3s; font-weight: 600; font-size: 0.85rem; width: 100%; color: #1e293b; }
        .input-field:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.05); }
        .label-text { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.05em; }
        .reg-card { border-radius: 2.5rem; background: #ffffff; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; }
        .tab-btn { transition: 0.3s; border-bottom: 3px solid transparent; cursor: pointer; padding-bottom: 12px; }
        .tab-btn.active { border-color: #2563eb; color: #2563eb; }
        #successOverlay { display: none; }
    </style>
</head>
<body class="min-h-screen py-10 px-4 flex flex-col items-center">

    <div id="successOverlay" class="fixed inset-0 z-[5000] bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-10 text-center max-w-xs w-full shadow-2xl">
            <div class="w-20 h-20 bg-green-100 text-green-500 rounded-3xl flex items-center justify-center mx-auto mb-6 text-3xl animate-bounce">
                <i class="fas fa-check-circle"></i>
            </div>
            <h3 class="text-xl font-black text-slate-900 uppercase">Welcome!</h3>
            <p class="text-xs font-bold text-slate-400 mt-2 uppercase tracking-widest">Login Successful... Redirecting to Dashboard</p>
        </div>
    </div>

    <div class="max-w-2xl w-full">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-block group">
                <div class="bg-blue-600 w-16 h-16 rounded-[1.5rem] shadow-xl shadow-blue-600/20 flex items-center justify-center mx-auto mb-4 text-white text-2xl font-black transition group-hover:scale-105">S</div>
                <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Smart<span class="text-blue-600">Seva</span></h1>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.4em] mt-1">Premium Customer Identity</p>
            </a>
        </div>

        <div class="reg-card p-8 md:p-12">
            <div class="flex gap-10 mb-10 border-b border-slate-50">
                <button id="loginTab" onclick="switchTab('login')" class="tab-btn active font-black uppercase text-xs tracking-widest">Login</button>
                <button id="signupTab" onclick="switchTab('signup')" class="tab-btn font-black uppercase text-xs tracking-widest text-slate-300">Registration</button>
            </div>

            <div id="loginSection">
                <form id="customerLoginForm" class="space-y-6">
                    <div>
                        <label class="label-text">Registered Phone</label>
                        <input type="tel" id="lPhone" required placeholder="Enter Mobile" class="input-field">
                    </div>
                    <div>
                        <label class="label-text">Security Password</label>
                        <input type="password" id="lPass" required minlength="6" placeholder="••••••••" class="input-field">
                    </div>
                    <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-[11px] tracking-widest shadow-xl hover:bg-blue-600 transition-all duration-300">
                        Access My Account
                    </button>
                </form>
            </div>

            <div id="signupSection" class="hidden space-y-6">
                <form id="customerRegForm" class="space-y-6">
                    <button type="button" onclick="getLocation()" id="gpsBtn" class="w-full bg-blue-50 text-blue-600 py-5 rounded-2xl font-black text-[11px] uppercase border-2 border-blue-600/10 hover:bg-blue-600 hover:text-white transition-all">
                       <i class="fas fa-location-crosshairs mr-2"></i> Detect My Current Location
                    </button>
                    <input type="hidden" id="cCoords">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div><label class="label-text">Full Name</label><input type="text" id="cName" required class="input-field"></div>
                        <div><label class="label-text">Father's Name</label><input type="text" id="cFather" required class="input-field"></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div><label class="label-text">Phone Number</label><input type="tel" id="cPhone" required class="input-field"></div>
                        <div><label class="label-text">12-Digit Aadhar ID</label><input type="number" id="cAadhar" required class="input-field"></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div><label class="label-text">State</label><input type="text" id="cState" required class="input-field"></div>
                        <div><label class="label-text">District</label><input type="text" id="cDistrict" required class="input-field"></div>
                        <div><label class="label-text">Pin Code</label><input type="number" id="cPin" required class="input-field"></div>
                    </div>

                    <div><label class="label-text">Detailed Address</label><textarea id="cAddr" required class="input-field h-24 resize-none"></textarea></div>

                    <div><label class="label-text">Create Password (Min 6 Characters)</label><input type="password" id="cPass" required minlength="6" class="input-field"></div>

                    <button type="submit" id="regBtn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-[11px] tracking-widest shadow-xl hover:bg-blue-700 transition-all">
                        Complete Registration
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDWRwmMzdLlWLhdf6KQL4iQi1VHx7uVwXQ",
            authDomain: "smart-seva-5bef9.firebaseapp.com",
            projectId: "smart-seva-5bef9",
            storageBucket: "smart-seva-5bef9.firebasestorage.app",
            messagingSenderId: "1042547190403",
            appId: "1:1042547190403:web:15ea1659a88bdf3621c9b6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // UI TABS
        function switchTab(type) {
            document.getElementById('loginSection').classList.toggle('hidden', type === 'signup');
            document.getElementById('signupSection').classList.toggle('hidden', type === 'login');
            document.getElementById('loginTab').classList.toggle('active', type === 'login');
            document.getElementById('signupTab').classList.toggle('active', type === 'signup');
            document.getElementById('signupTab').classList.toggle('text-slate-300', type === 'login');
            document.getElementById('loginTab').classList.toggle('text-slate-300', type === 'signup');
        }

        // GPS LOGIC (Fixed for High Accuracy)
        async function fetchAddress(lat, lon) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
                const data = await response.json();
                if (data.address) {
                    document.getElementById('cState').value = data.address.state || "";
                    document.getElementById('cDistrict').value = data.address.district || data.address.city || data.address.county || "";
                    document.getElementById('cPin').value = data.address.postcode || "";
                    document.getElementById('cAddr').value = data.display_name || "";
                }
            } catch (err) { alert("Address fetch error. Please fill manually."); }
        }

        function getLocation() {
            const btn = document.getElementById('gpsBtn');
            if (navigator.geolocation) {
                btn.innerText = "Connecting to Satellite...";
                navigator.geolocation.getCurrentPosition(async (p) => {
                    document.getElementById('cCoords').value = `${p.coords.latitude}, ${p.coords.longitude}`;
                    await fetchAddress(p.coords.latitude, p.coords.longitude);
                    btn.innerHTML = `<i class="fas fa-check-circle mr-2"></i> Location Synced`;
                    btn.className = "w-full bg-green-50 text-green-600 py-5 rounded-2xl font-black text-[11px] uppercase border-2 border-green-600/20";
                }, (error) => {
                    alert("GPS Error: Please enable location permissions in browser settings.");
                    btn.innerText = "Detect My Current Location";
                }, { enableHighAccuracy: true });
            }
        }

        // SIGNUP
        document.getElementById('customerRegForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const pass = document.getElementById('cPass').value;
            
            if(pass.length < 6) return alert("Password must be 6 characters long.");

            btn.innerText = "Processing...";
            btn.disabled = true;

            const userData = {
                name: document.getElementById('cName').value,
                phone: document.getElementById('cPhone').value.trim(),
                aadhar: document.getElementById('cAadhar').value,
                password: pass.trim(),
                state: document.getElementById('cState').value,
                district: document.getElementById('cDistrict').value,
                address: document.getElementById('cAddr').value,
                createdAt: new Date()
            };

            try {
                const check = await db.collection("customers").where("phone", "==", userData.phone).get();
                if(!check.empty) {
                    alert("Number already registered!");
                    btn.disabled = false; btn.innerText = "Complete Registration";
                } else {
                    await db.collection("customers").add(userData);
                    localStorage.setItem("smartSevaUser", JSON.stringify(userData));
                    document.getElementById('successOverlay').style.display = "flex";
                    setTimeout(() => { window.location.href = "customer-dash.html"; }, 2000);
                }
            } catch (err) { alert(err.message); btn.disabled = false; }
        });

        // LOGIN
        document.getElementById('customerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('lPhone').value.trim();
            const pass = document.getElementById('lPass').value.trim();
            const btn = e.target.querySelector('button');
            btn.innerText = "Authenticating...";

            try {
                const snap = await db.collection("customers").where("phone", "==", phone).where("password", "==", pass).get();
                if (snap.empty) {
                    alert("Incorrect Credentials. Please try again.");
                    btn.innerText = "Access My Account";
                } else {
                    localStorage.setItem("smartSevaUser", JSON.stringify(snap.docs[0].data()));
                    document.getElementById('successOverlay').style.display = "flex";
                    setTimeout(() => { window.location.href = "customer-dash.html"; }, 1500);
                }
            } catch (err) { alert("Login failed!"); btn.innerText = "Access My Account"; }
        });
    </script>
</body>
</html>
