<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Seva - Home Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        .hero-overlay { background: rgba(0,0,0,0.55); }
        .swiper { width: 100%; h: 550px; }
        .swiper-slide { position: relative; }
        .swiper-slide img { width: 100%; h: 100%; object-fit: cover; }
        .hero-content { position: absolute; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; text-align: center; color: white; padding: 1rem; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-600">Smart<span class="text-orange-500">Seva</span></div>
            <div class="hidden md:flex space-x-8 font-semibold text-gray-700">
                <a href="#" class="hover:text-blue-600">Home</a>
                <a href="#" class="hover:text-blue-600">Services</a>
                <a href="#" class="hover:text-blue-600">Become a Partner</a>
            </div>
            <button class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 transition">Login</button>
        </div>
    </nav>

    <div class="relative overflow-hidden">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                
                <div class="swiper-slide">
                    <img src="https://images.unsplash.com/photo-1621905251918-48416bd8575a?auto=format&fit=crop&w=1600&q=80" alt="Electrician">
                    <div class="absolute inset-0 hero-overlay"></div>
                    <div class="hero-content">
                        <div>
                            <h1 class="text-3xl md:text-5xl font-extrabold mb-3">Expert Electricians</h1>
                            <p class="text-gray-100 text-lg mb-6">Safe & Reliable Wiring, Installations, Repairs.</p>
                            <button class="bg-orange-500 text-white px-8 py-3 rounded-full font-bold text-lg hover:bg-orange-600 transition">Book Now</button>
                        </div>
                    </div>
                </div>

                <div class="swiper-slide">
                    <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952?auto=format&fit=crop&w=1600&q=80" alt="Cleaning Service">
                    <div class="absolute inset-0 hero-overlay"></div>
                    <div class="hero-content">
                        <div>
                            <h1 class="text-3xl md:text-5xl font-extrabold mb-3">Home Deep Cleaning</h1>
                            <p class="text-gray-100 text-lg mb-6">Ghar chamkaye sirf ₹999 se shuru.</p>
                            <button class="bg-orange-500 text-white px-8 py-3 rounded-full font-bold text-lg hover:bg-orange-600 transition">View Offers</button>
                        </div>
                    </div>
                </div>

                <div class="swiper-slide">
                    <img src="https://images.unsplash.com/photo-1603712760331-5079a4055236?auto=format&fit=crop&w=1600&q=80" alt="Verified Professionals">
                    <div class="absolute inset-0 hero-overlay"></div>
                    <div class="hero-content">
                        <div>
                            <h1 class="text-3xl md:text-5xl font-extrabold mb-3">Verified Experts Only</h1>
                            <p class="text-gray-100 text-lg mb-6">100% Background Checked for your safety.</p>
                        </div>
                    </div>
                </div>
                
            </div>
            <div class="swiper-button-next text-white"></div>
            <div class="swiper-button-prev text-white"></div>
            <div class="swiper-pagination"></div>
        </div>
    </div>

    <div class="container mx-auto px-4 -mt-12 relative z-20">
        <div class="max-w-2xl mx-auto bg-white p-3 rounded-full shadow-2xl flex items-center border border-gray-100">
            <i class="fas fa-search text-gray-400 ml-4 mr-2"></i>
            <input type="text" placeholder="Aapko kya help chahiye? (e.g. AC Repair)" 
                   class="w-full px-2 py-3 outline-none text-gray-700 rounded-full text-base">
            <button class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-700 transition">Search</button>
        </div>
    </div>

    <section class="py-16">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-bold text-center text-gray-800 mb-12">Hamari Services</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm hover:shadow-xl transition-all border border-gray-100 text-center cursor-pointer flex flex-col items-center">
                    <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mb-4 text-2xl"><i class="fas fa-bolt"></i></div>
                    <h3 class="font-bold text-gray-800">Electrician</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm hover:shadow-xl transition-all border border-gray-100 text-center cursor-pointer flex flex-col items-center">
                    <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mb-4 text-2xl"><i class="fas fa-faucet"></i></div>
                    <h3 class="font-bold text-gray-800">Plumber</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm hover:shadow-xl transition-all border border-gray-100 text-center cursor-pointer flex flex-col items-center">
                    <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mb-4 text-2xl"><i class="fas fa-snowflake"></i></div>
                    <h3 class="font-bold text-gray-800">AC Repair</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm hover:shadow-xl transition-all border border-gray-100 text-center cursor-pointer flex flex-col items-center">
                    <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mb-4 text-2xl"><i class="fas fa-broom"></i></div>
                    <h3 class="font-bold text-gray-800">Cleaning</h3>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Slider Initialize karne ki Script
        var swiper = new Swiper(".mySwiper", {
            spaceBetween: 0,
            centeredSlides: true,
            autoplay: {
                delay: 4000, // 4 seconds mein automatic change hoga
                disableOnInteraction: false,
            },
            pagination: {
                el: ".swiper-pagination",
                clickable: true,
            },
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
            loop: true, // Infinite loop
        });
    </script>

</body>
</html>
