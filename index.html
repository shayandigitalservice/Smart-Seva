<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Seva - Home Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        .hero-overlay { background: rgba(0, 0, 0, 0.6); }
        .swiper-slide { position: relative; height: 450px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
        /* Mobile menu hidden by default */
        #mobile-menu { display: none; }
        #mobile-menu.active { display: block; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-600">Smart<span class="text-orange-500">Seva</span></div>
            
            <div class="hidden md:flex space-x-6 font-medium">
                <a href="#" class="hover:text-blue-600">Home</a>
                <a href="#" class="hover:text-blue-600">Services</a>
                <a href="#" class="hover:text-blue-600">Become a Partner</a>
            </div>

            <div class="flex items-center space-x-4">
                <button class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 text-sm">Login</button>
                
                <button id="menu-btn" class="md:hidden text-2xl text-gray-700">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>

        <div id="mobile-menu" class="md:hidden bg-white border-t border-gray-100 p-4">
            <a href="#" class="block py-2 text-gray-700 font-medium border-b border-gray-50">Home</a>
            <a href="#" class="block py-2 text-gray-700 font-medium border-b border-gray-50">Services</a>
            <a href="#" class="block py-2 text-gray-700 font-medium">Become a Partner</a>
        </div>
    </nav>

    <div class="swiper mySwiper relative h-[450px]">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952?auto=format&fit=crop&w=1600&q=80">
                <div class="absolute inset-0 hero-overlay flex items-center justify-center text-center px-4">
                    <div class="z-10">
                        <h1 class="text-2xl md:text-5xl font-extrabold text-white mb-4">Ghar ki har Service, ab Smart hogi!</h1>
                        <p class="text-gray-200 text-sm md:text-lg mb-8">Cleaning, Plumbing, Electrician aur bohot kuch...</p>
                    </div>
                </div>
            </div>
            <div class="swiper-slide">
                <img src="https://images.unsplash.com/photo-1621905251918-48416bd8575a?auto=format&fit=crop&w=1600&q=80">
                <div class="absolute inset-0 hero-overlay flex items-center justify-center text-center px-4">
                    <div class="z-10">
                        <h1 class="text-2xl md:text-5xl font-extrabold text-white mb-4">Expert Electricians</h1>
                        <p class="text-gray-200 text-sm md:text-lg mb-8">Safe & Reliable services at your doorstep.</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="absolute bottom-10 left-0 right-0 z-30 px-4">
            <div class="max-w-2xl mx-auto bg-white p-2 rounded-full shadow-2xl flex items-center">
                <i class="fas fa-search text-gray-400 ml-4"></i>
                <input type="text" placeholder="Aapko kya help chahiye?" class="w-full px-4 py-3 outline-none text-gray-700 rounded-full text-sm">
                <button class="bg-blue-600 text-white px-6 py-3 rounded-full font-bold hover:bg-blue-700 transition text-sm">Search</button>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4 py-12">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-6 rounded-xl shadow-lg text-center hover:transform hover:-translate-y-1 transition cursor-pointer border border-gray-100">
                <i class="fas fa-bolt text-3xl text-yellow-500 mb-2"></i>
                <p class="font-bold text-sm">Electrician</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-lg text-center hover:transform hover:-translate-y-1 transition cursor-pointer border border-gray-100">
                <i class="fas fa-faucet text-3xl text-blue-500 mb-2"></i>
                <p class="font-bold text-sm">Plumber</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-lg text-center hover:transform hover:-translate-y-1 transition cursor-pointer border border-gray-100">
                <i class="fas fa-broom text-3xl text-green-500 mb-2"></i>
                <p class="font-bold text-sm">Cleaning</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-lg text-center hover:transform hover:-translate-y-1 transition cursor-pointer border border-gray-100">
                <i class="fas fa-paint-roller text-3xl text-red-500 mb-2"></i>
                <p class="font-bold text-sm">Painting</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Slider Logic
        var swiper = new Swiper(".mySwiper", {
            loop: true,
            autoplay: { delay: 3000, disableOnInteraction: false },
        });

        // Mobile Menu Logic
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
            // Change icon from Bars to X
            const icon = menuBtn.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-times');
        });
    </script>
</body>
</html>
