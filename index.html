<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Seva - India's #1 Home Service App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        html, body { height: 100%; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; display: flex; flex-direction: column; background-color: #ffffff; }
        .main-content { flex: 1 0 auto; }
        .footer-fixed { flex-shrink: 0; }
        .hero-slide { height: 400px; } 
        @media (max-width: 640px) { .hero-slide { height: 260px; } }
        .btn-box { border: 2px solid #2563eb; color: #2563eb; font-weight: 700; padding: 6px 14px; border-radius: 8px; transition: 0.3s; font-size: 0.75rem; text-transform: uppercase; display: inline-block; }
        .btn-box:hover { background: #2563eb; color: white !important; }
        #mobile-menu { max-height: 0; overflow: hidden; transition: 0.4s ease-out; }
        #mobile-menu.active { max-height: 500px; }
        .hero-overlay { background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent); }
        .seo-gradient { background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%); }

        /* Naya Style: Worker Card (Sirf List ke liye) */
        .worker-card { border: 1px solid #f1f5f9; transition: 0.3s; border-radius: 2rem; background: white; padding: 20px; }
        .worker-card:hover { border-color: #2563eb; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-gray-900">

    <div class="main-content">
        <header class="bg-white border-b border-gray-100 sticky top-0 z-[1000] shadow-sm">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <a href="index.html" class="flex items-center space-x-3">
                    <div class="logo-container"><img src="https://via.placeholder.com/45x45/2563eb/ffffff?text=S" alt="SmartSeva Logo" class="w-11 h-11 rounded-xl shadow-md object-cover"></div>
                    <div class="flex flex-col leading-tight">
                        <span class="text-xl font-black tracking-tight text-slate-800 uppercase">Smart<span class="text-blue-600">Seva</span></span>
                        <span class="text-[9px] text-orange-600 font-bold uppercase tracking-[0.2em]">Premium Solutions</span>
                    </div>
                </a>
                <div class="hidden lg:flex items-center space-x-4">
                    <a href="index.html" class="text-blue-600 font-bold px-4">Home</a>
                    <a href="partner.html" class="btn-box">Join as Expert</a>
                    <a href="customer-dash.html" class="btn-box">My Dashboard</a>
                </div>
                <button id="menu-btn" class="lg:hidden text-2xl text-slate-800 focus:outline-none"><i class="fas fa-bars-staggered"></i></button>
            </div>
            <div id="mobile-menu" class="lg:hidden bg-white border-t border-gray-100 shadow-xl">
                <div class="flex flex-col p-6 space-y-4 text-center text-sm uppercase font-bold tracking-wider">
                    <a href="index.html" class="text-blue-600">Home</a>
                    <a href="partner.html" class="btn-box">Join as Expert</a>
                    <a href="customer-dash.html" class="btn-box">My Dashboard</a>
                </div>
            </div>
        </header>

        <section class="bg-blue-600 py-6 md:py-8 px-4 text-white text-center">
            <div class="max-w-2xl mx-auto">
                <h1 class="text-xl md:text-3xl font-black mb-4 italic">Aapko aaj kya help chahiye?</h1>
                <form id="searchForm" class="flex bg-white rounded-xl shadow-lg overflow-hidden p-1">
                    <input type="text" id="searchInput" placeholder="Electrician, Plumber, Cleaning..." class="w-full px-4 py-2 outline-none text-gray-700 font-bold text-sm">
                    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition">Search</button>
                </form>
            </div>
        </section>

        <div class="container mx-auto px-4 py-8">
            <div class="swiper mySwiper rounded-[2.5rem] overflow-hidden shadow-2xl">
                <div class="swiper-wrapper">
                    <div class="swiper-slide hero-slide">
                        <img src="https://images.pexels.com/photos/257736/pexels-photo-257736.jpeg?auto=format&fit=crop&w=1400" class="w-full h-full object-cover">
                        <div class="absolute inset-0 hero-overlay flex items-center justify-center text-white"><h2 class="text-3xl font-black uppercase italic">Expert Electricians</h2></div>
                    </div>
                    </div>
                <div class="swiper-pagination"></div>
            </div>
        </div>

        <section class="container mx-auto px-4 py-8">
            <h2 class="text-2xl font-black text-gray-800 mb-8 flex items-center uppercase tracking-tight italic">
                <span class="w-2.5 h-10 bg-blue-600 mr-4 rounded-full"></span> Hamari Services
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <div onclick="showWorkers('electrician')" class="service-item bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-2xl transition text-center cursor-pointer group">
                    <div class="bg-yellow-50 text-yellow-500 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:bg-yellow-500 group-hover:text-white transition"><i class="fas fa-bolt text-3xl"></i></div>
                    <h3 class="font-extrabold text-gray-800 uppercase text-xs tracking-widest italic">Electrician</h3>
                </div>
                <div onclick="showWorkers('plumber')" class="service-item bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-2xl transition text-center cursor-pointer group">
                    <div class="bg-blue-50 text-blue-500 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:bg-blue-500 group-hover:text-white transition"><i class="fas fa-faucet text-3xl"></i></div>
                    <h3 class="font-extrabold text-gray-800 uppercase text-xs tracking-widest italic">Plumber</h3>
                </div>
                </div>
        </section>

        <section id="workerSection" class="hidden container mx-auto px-4 py-12 bg-slate-50 rounded-[3rem] mb-10">
            <div class="flex justify-between items-center mb-8 px-4">
                <h2 class="text-xl font-black uppercase italic">Experts in <span id="userDistrict" class="text-blue-600 underline">Your Area</span></h2>
                <button onclick="document.getElementById('workerSection').classList.add('hidden')" class="text-gray-400 font-bold text-xs uppercase">Close <i class="fas fa-times-circle ml-1"></i></button>
            </div>
            <div id="workerGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 px-4">
                </div>
        </section>

        <section class="seo-gradient py-20 border-t border-slate-100">
             <div class="container mx-auto px-4 max-w-5xl">
                <h2 class="text-3xl md:text-5xl font-black text-slate-900 mb-8 border-l-8 border-blue-600 pl-4 italic">Smart Seva - India's Trusted Home Service Network</h2>
                </div>
        </section>
    </div>

    <div id="bookingModal" class="fixed inset-0 z-[2000] hidden flex items-center justify-center px-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-red-500 transition text-2xl"><i class="fas fa-times-circle"></i></button>
            <div class="text-center mb-6">
                <h3 class="text-xl font-black text-blue-600 uppercase italic">Confirm Booking</h3>
                <p class="text-[10px] font-bold text-slate-400 uppercase">Worker: <span id="targetWorker" class="text-slate-800"></span></p>
            </div>
            <form id="finalForm" class="space-y-4">
                <input type="hidden" id="wId">
                <input type="hidden" id="wCat">
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Service Date</label>
                    <input type="date" id="sDate" required class="w-full px-5 py-3 rounded-xl border border-gray-100 bg-gray-50 font-bold text-sm outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Explain Problem (Optional)</label>
                    <textarea id="sMsg" placeholder="Apni dikkat batayein..." class="w-full px-5 py-3 rounded-xl border border-gray-100 bg-gray-50 font-bold text-sm h-24 outline-none"></textarea>
                </div>
                <button type="submit" id="finalBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg italic">Confirm Request</button>
            </form>
        </div>
    </div>

    <footer class="footer-fixed bg-slate-950 text-slate-500 pt-16 pb-6">
        </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config (Replace with yours)
        const firebaseConfig = { apiKey: "...", /* etc */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Original Swiper Init
        new Swiper(".mySwiper", { loop: true, autoplay: { delay: 3500 }, pagination: { el: ".swiper-pagination", clickable: true } });

        // KYC Check
        function checkUser() {
            const user = localStorage.getItem("smartSevaUser");
            if(!user) {
                alert("Security: Pehle Registration & KYC poora karein!");
                window.location.href = "customer-reg.html";
                return null;
            }
            return JSON.parse(user);
        }

        // Logic: Show Workers in Marketplace
        async function showWorkers(category) {
            const user = checkUser();
            if(!user) return;

            const section = document.getElementById('workerSection');
            const grid = document.getElementById('workerGrid');
            document.getElementById('userDistrict').innerText = user.district;

            section.classList.remove('hidden');
            grid.innerHTML = "<p class='col-span-full text-center py-10 font-bold text-slate-300'>Finding Experts...</p>";
            window.scrollTo({ top: section.offsetTop - 100, behavior: 'smooth' });

            const snap = await db.collection("workers")
                .where("category", "==", category)
                .where("district", "==", user.district)
                .where("status", "==", "active").get();

            grid.innerHTML = "";
            if(snap.empty) {
                grid.innerHTML = "<p class='col-span-full text-center py-10 font-black text-red-400'>Aapke area mein koi worker active nahi hai.</p>";
                return;
            }

            snap.forEach(doc => {
                const w = doc.data();
                grid.innerHTML += `
                    <div class="worker-card">
                        <h4 class="font-black text-slate-800 uppercase italic text-sm">${w.name}</h4>
                        <p class="text-[10px] font-bold text-blue-600 mt-1 uppercase">${w.experience} Years Exp | ⭐ 4.8</p>
                        <p class="text-[9px] text-slate-400 mt-2 italic">${w.location}</p>
                        <button onclick="openBooking('${doc.id}', '${w.name}', '${category}')" class="w-full mt-4 bg-slate-900 text-white py-3 rounded-xl font-black text-[10px] uppercase">Book Expert</button>
                    </div>`;
            });
        }

        // Modal Controls
        function openBooking(id, name, cat) {
            document.getElementById('wId').value = id;
            document.getElementById('targetWorker').innerText = name;
            document.getElementById('wCat').value = cat;
            document.getElementById('bookingModal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('bookingModal').classList.add('hidden'); }

        // Final Submit
        document.getElementById('finalForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = JSON.parse(localStorage.getItem("smartSevaUser"));
            const btn = document.getElementById('finalBtn');
            btn.disabled = true; btn.innerText = "Requesting...";

            const booking = {
                workerId: document.getElementById('wId').value,
                workerName: document.getElementById('targetWorker').innerText,
                service: document.getElementById('wCat').value,
                serviceDate: document.getElementById('sDate').value,
                userMsg: document.getElementById('sMsg').value,
                customerName: user.name,
                customerPhone: user.phone,
                customerAddress: user.address,
                status: 'pending',
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            await db.collection("bookings").add(booking);
            alert("Booking Sent! Dashboard check karein.");
            window.location.href = "customer-dash.html";
        });
    </script>
</body>
</html>
