<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Seva - Home Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hero-overlay {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6));
        }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-600">Smart<span class="text-orange-500">Seva</span></div>
            <div class="hidden md:flex space-x-8 font-semibold text-gray-700">
                <a href="#" class="hover:text-blue-600 transition">Home</a>
                <a href="#" class="hover:text-blue-600 transition">Services</a>
                <a href="#" class="hover:text-blue-600 transition">Become a Partner</a>
            </div>
            <button class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 transition">Login</button>
        </div>
    </nav>

    <div class="relative h-[550px] flex items-center justify-center text-center">
        <img src="https://images.unsplash.com/photo-1621905251918-48416bd8575a?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80" 
             class="absolute inset-0 w-full h-full object-cover" alt="Banner">
        
        <div class="absolute inset-0 hero-overlay"></div>

        <div class="relative z-10 px-4">
            <h1 class="text-4xl md:text-6xl font-extrabold text-white mb-4">Ghar Ki Har Service,<br>Ab <span class="text-orange-400">Smart</span> Hogi!</h1>
            <p class="text-gray-200 text-lg mb-8 max-w-lg mx-auto">Expert Electricians, Plumbers aur Cleaners bas ek click ki doori par.</p>
            
            <div class="max-w-xl mx-auto bg-white p-2 rounded-full shadow-2xl flex items-center">
                <i class="fas fa-map-marker-alt text-blue-500 ml-4"></i>
                <input type="text" placeholder="Aapka Area?" class="w-32 px-2 outline-none text-sm border-r border-gray-200 hidden md:block">
                <input type="text" placeholder="Kya help chahiye? (e.g. AC Repair)" class="w-full px-4 py-3 outline-none text-gray-700">
                <button class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-700 transition">Search</button>
            </div>
        </div>
    </div>

    <section class="py-16">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-bold text-center text-gray-800 mb-12">Hamari Popular Services</h2>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-8">
                <div class="bg-white p-8 rounded-2xl shadow-sm hover:shadow-2xl transition-all border-b-4 border-transparent hover:border-blue-600 text-center cursor-pointer">
                    <div class="text-4xl text-blue-600 mb-4"><i class="fas fa-bolt"></i></div>
                    <h3 class="font-bold text-xl text-gray-800">Electrician</h3>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-sm hover:shadow-2xl transition-all border-b-4 border-transparent hover:border-blue-600 text-center cursor-pointer">
                    <div class="text-4xl text-blue-600 mb-4"><i class="fas fa-faucet"></i></div>
                    <h3 class="font-bold text-xl text-gray-800">Plumber</h3>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-sm hover:shadow-2xl transition-all border-b-4 border-transparent hover:border-blue-600 text-center cursor-pointer">
                    <div class="text-4xl text-blue-600 mb-4"><i class="fas fa-snowflake"></i></div>
                    <h3 class="font-bold text-xl text-gray-800">AC Repair</h3>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-sm hover:shadow-2xl transition-all border-b-4 border-transparent hover:border-blue-600 text-center cursor-pointer">
                    <div class="text-4xl text-blue-600 mb-4"><i class="fas fa-broom"></i></div>
                    <h3 class="font-bold text-xl text-gray-800">Cleaning</h3>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
