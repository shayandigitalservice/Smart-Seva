<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Partner Portal | SmartSeva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .main-wrapper { display: flex; min-height: 100vh; background: #fff; }
        
        /* Left Info Side */
        .side-info {
            flex: 1;
            background: linear-gradient(rgba(37, 99, 235, 0.9), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1581094794329-c8112a89af12?q=80&w=1000') no-repeat center center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; padding: 60px; text-align: center;
        }

        /* Right Form Side */
        .form-area { flex: 1.2; display: flex; justify-content: center; align-items: center; padding: 40px; background: #f8fafc; }
        .form-card { width: 100%; max-width: 550px; background: white; padding: 40px; border-radius: 2rem; shadow: 0 20px 50px rgba(0,0,0,0.05); }

        .input-group { margin-bottom: 15px; }
        .label-text { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .input-box { width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .input-box:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 4px rgba(37,99,235,0.05); }

        .btn-submit { width: 100%; background: #2563eb; color: white; padding: 16px; border-radius: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; margin-top: 20px; }
        .btn-submit:hover { background: #1e40af; transform: translateY(-2px); }

        .tab-btn { font-size: 12px; font-weight: 800; color: #94a3b8; padding-bottom: 8px; border-bottom: 3px solid transparent; cursor: pointer; }
        .tab-btn.active { color: #2563eb; border-color: #2563eb; }
        
        .file-info { font-size: 9px; color: #64748b; font-weight: 700; margin-top: 4px; }
        .custom-scroll { max-height: 500px; overflow-y: auto; padding-right: 10px; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        @media (max-width: 1024px) { .side-info { display: none; } }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="side-info">
            <h1 class="text-5xl font-black mb-6">EXPERT <span class="text-blue-400">PORTAL</span></h1>
            <p class="text-lg opacity-80 leading-relaxed">Join SmartSeva as a Professional Partner. Provide services in your area and grow your business with us.</p>
        </div>

        <div class="form-area">
            <div class="form-card">
                <div class="text-center mb-8">
                    <div class="bg-blue-600 w-12 h-12 rounded-xl flex items-center justify-center text-white text-xl font-black mx-auto mb-3">S</div>
                    <h2 class="text-2xl font-black text-slate-800">PARTNER ACCESS</h2>
                </div>

                <div class="flex gap-8 mb-8 border-b border-slate-100">
                    <button id="loginTab" onclick="switchTab('login')" class="tab-btn active uppercase">Login</button>
                    <button id="signupTab" onclick="switchTab('signup')" class="tab-btn uppercase">Apply for Partnership</button>
                </div>

                <div id="loginSection">
                    <form id="workerLoginForm" class="space-y-6">
                        <div class="input-group">
                            <label class="label-text">Phone Number</label>
                            <input type="tel" id="lPhone" required class="input-box" placeholder="Registered mobile">
                        </div>
                        <div class="input-group">
                            <label class="label-text">Password</label>
                            <input type="password" id="lPass" required class="input-box" placeholder="••••••">
                        </div>
                        <button type="submit" class="btn-submit">Sign In to Dashboard</button>
                    </form>
                </div>

                <div id="signupSection" class="hidden custom-scroll">
                    <form id="workerSignupForm">
                        <button type="button" onclick="getLocation()" id="gpsBtn" class="w-full py-4 mb-6 bg-blue-50 text-blue-600 rounded-xl font-black text-[10px] uppercase border-2 border-blue-100">
                            <i class="fas fa-location-crosshairs mr-2"></i> Detect My Service Location
                        </button>

                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="input-group">
                                <label class="label-text">Expert Name</label>
                                <input type="text" id="wName" required class="input-box">
                            </div>
                            <div class="input-group">
                                <label class="label-text">Father's Name</label>
                                <input type="text" id="wFather" required class="input-box">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="input-group">
                                <label class="label-text">Category</label>
                                <select id="wCategory" class="input-box">
                                    <option value="electrician">Electrician</option>
                                    <option value="plumber">Plumber</option>
                                    <option value="cleaning">Cleaning</option>
                                    <option value="repairing">Repairing</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label class="label-text">Mobile</label>
                                <input type="tel" id="wPhone" required class="input-box">
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="label-text">Current Full Address</label>
                            <textarea id="wAddr" required class="input-box h-20 resize-none"></textarea>
                        </div>

                        <div class="grid grid-cols-3 gap-4 mb-4">
                            <input type="text" id="wState" placeholder="State" required class="input-box">
                            <input type="text" id="wDistrict" placeholder="District" required class="input-box">
                            <input type="text" id="wPin" placeholder="Pin" required class="input-box">
                        </div>

                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="label-text">Passport Photo</label>
                                <input type="file" id="wPhoto" accept="image/*" required class="text-[9px]">
                                <p class="file-info">Max 2MB Image</p>
                            </div>
                            <div>
                                <label class="label-text">Aadhar Image</label>
                                <input type="file" id="wAadharImg" accept="image/*" required class="text-[9px]">
                                <p class="file-info">Max 2MB Image</p>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="label-text">Create Password</label>
                            <input type="password" id="wPass" minlength="6" required class="input-box">
                        </div>

                        <button type="submit" id="signupBtn" class="btn-submit">Submit Application</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDWRwmMzdLlWLhdf6KQL4iQi1VHx7uVwXQ",
            authDomain: "smart-seva-5bef9.firebaseapp.com",
            databaseURL: "https://smart-seva-5bef9-default-rtdb.firebaseio.com",
            projectId: "smart-seva-5bef9",
            storageBucket: "smart-seva-5bef9.firebasestorage.app",
            messagingSenderId: "1042547190403",
            appId: "1:1042547190403:web:15ea1659a88bdf3621c9b6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        function switchTab(type) {
            document.getElementById('loginSection').classList.toggle('hidden', type === 'signup');
            document.getElementById('signupSection').classList.toggle('hidden', type === 'login');
            document.getElementById('loginTab').classList.toggle('active', type === 'login');
            document.getElementById('signupTab').classList.toggle('active', type === 'signup');
        }

        async function getLocation() {
            const btn = document.getElementById('gpsBtn');
            btn.innerText = "Syncing Location...";
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                const data = await res.json();
                const addr = data.address;
                document.getElementById('wState').value = addr.state || "";
                document.getElementById('wDistrict').value = addr.district || addr.city || addr.town || "";
                document.getElementById('wPin').value = addr.postcode || "";
                document.getElementById('wAddr').value = data.display_name || "";
                btn.innerHTML = "📍 Location Synced";
                btn.className = "w-full py-4 mb-6 bg-green-50 text-green-600 rounded-xl font-black text-[10px] uppercase border-2 border-green-100";
            }, () => alert("Enable GPS"));
        }

        // Registration with Image Upload Logic
        document.getElementById('workerSignupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            const phone = document.getElementById('wPhone').value.trim();
            const photoFile = document.getElementById('wPhoto').files[0];
            const aadharFile = document.getElementById('wAadharImg').files[0];

            btn.disabled = true;
            btn.innerText = "Uploading Files...";

            try {
                // Uploading to Storage
                const photoRef = storage.ref(`experts/${phone}/photo.jpg`);
                await photoRef.put(photoFile);
                const photoURL = await photoRef.getDownloadURL();

                const aadharRef = storage.ref(`experts/${phone}/aadhar.jpg`);
                await aadharRef.put(aadharFile);
                const aadharURL = await aadharRef.getDownloadURL();

                // Saving to Realtime Database
                const expertData = {
                    name: document.getElementById('wName').value,
                    father: document.getElementById('wFather').value,
                    category: document.getElementById('wCategory').value,
                    phone: phone,
                    state: document.getElementById('wState').value,
                    district: document.getElementById('wDistrict').value,
                    pin: document.getElementById('wPin').value,
                    address: document.getElementById('wAddr').value,
                    password: document.getElementById('wPass').value,
                    photo: photoURL,
                    aadhar: aadharURL,
                    status: "pending",
                    createdAt: new Date().toISOString()
                };

                await db.ref('experts/' + phone).set(expertData);
                alert("Application submitted! Admin will approve your profile soon.");
                window.location.reload();

            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "Submit Application";
            }
        });

        // Login Logic
        document.getElementById('workerLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const phone = document.getElementById('lPhone').value.trim();
            const pass = document.getElementById('lPass').value;

            db.ref('experts/' + phone).once('value').then((snap) => {
                const data = snap.val();
                if(data && data.password === pass) {
                    if(data.status === "pending") {
                        alert("Account still pending approval from Admin.");
                    } else {
                        localStorage.setItem("expertUser", JSON.stringify(data));
                        window.location.href = "expert-dash.html";
                    }
                } else { alert("Invalid Credentials!"); }
            });
        });
    </script>
</body>
</html>
