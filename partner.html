<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Partner Portal - SmartSeva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .input-field { background: #ffffff; border: 2px solid #f1f5f9; border-radius: 12px; padding: 12px 16px; outline: none; transition: 0.3s; font-weight: 600; font-size: 0.85rem; width: 100%; color: #1e293b; }
        .input-field:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.05); }
        .label-text { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.05em; }
        .reg-card { border-radius: 2rem; background: #ffffff; box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; }
        .tab-btn { transition: 0.3s; border-bottom: 3px solid transparent; cursor: pointer; }
        .tab-btn.active { border-color: #2563eb; color: #2563eb; }
        .file-error { color: #ef4444; font-size: 9px; font-weight: 700; margin-top: 4px; display: none; }
    </style>
</head>
<body class="min-h-screen py-10 px-4 flex flex-col items-center">

    <div class="max-w-3xl w-full">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-block">
                <div class="bg-blue-600 w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center mx-auto mb-3 text-white text-xl font-black">S</div>
                <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Smart<span class="text-blue-600">Seva</span></h1>
                <p class="text-[9px] font-black text-blue-500 uppercase tracking-[0.3em]">Professional Expert Partnership</p>
            </a>
        </div>

        <div class="reg-card p-8 md:p-12 relative overflow-hidden">
            <div class="flex gap-8 mb-10 border-b border-gray-100">
                <button id="loginTab" onclick="switchTab('login')" class="tab-btn active pb-4 font-bold uppercase text-xs tracking-widest">Expert Login</button>
                <button id="signupTab" onclick="switchTab('signup')" class="tab-btn pb-4 font-bold uppercase text-xs tracking-widest text-gray-400">Join as Expert</button>
            </div>

            <div id="loginSection">
                <h2 class="text-xl font-black text-slate-900 uppercase mb-6">Partner Login</h2>
                <form id="workerLoginForm" class="space-y-5">
                    <div>
                        <label class="label-text">Registered Phone Number</label>
                        <input type="tel" id="lPhone" required placeholder="Enter Mobile Number" class="input-field">
                    </div>
                    <div>
                        <label class="label-text">Password</label>
                        <input type="password" id="lPass" required placeholder="••••••••" class="input-field">
                    </div>
                    <div class="flex justify-end">
                        <button type="button" onclick="forgotPassword()" class="text-[10px] font-bold text-blue-600 uppercase tracking-widest hover:underline">Forgot Password?</button>
                    </div>
                    <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase tracking-widest text-xs shadow-xl hover:bg-blue-600 transition-all">
                        Access Dashboard
                    </button>
                </form>
            </div>

            <div id="signupSection" class="hidden">
                <h2 class="text-xl font-black text-slate-900 uppercase mb-6 border-b pb-4">Professional Registration</h2>
                <form id="workerSignupForm" class="space-y-6">
                    <div class="mb-6">
                        <button type="button" onclick="getLocation()" id="gpsBtn" class="w-full bg-blue-50 text-blue-600 py-4 rounded-xl font-black text-[11px] uppercase border-2 border-blue-600/10 hover:bg-blue-600 hover:text-white transition">
                           <i class="fas fa-location-crosshairs mr-2"></i> Detect Service Area (Auto-Fill)
                        </button>
                        <input type="hidden" id="wCoords">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="label-text">Full Name</label>
                            <input type="text" id="wName" required placeholder="Full Name" class="input-field">
                        </div>
                        <div>
                            <label class="label-text">Father's Name</label>
                            <input type="text" id="wFather" required placeholder="Father's Name" class="input-field">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="label-text">Service Category</label>
                            <select id="wCategory" required class="input-field">
                                <option value="electrician">Electrician</option>
                                <option value="plumber">Plumber</option>
                                <option value="cleaning">Cleaning</option>
                                <option value="repairing">Repairing</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">Experience (In Years)</label>
                            <input type="number" id="wExp" required placeholder="Ex: 5" class="input-field">
                        </div>
                        <div>
                            <label class="label-text">Phone Number</label>
                            <input type="tel" id="wPhone" required placeholder="Mobile Number" class="input-field">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div><label class="label-text">State</label><input type="text" id="wState" required class="input-field"></div>
                        <div><label class="label-text">District</label><input type="text" id="wDistrict" required class="input-field"></div>
                        <div><label class="label-text">Pincode</label><input type="number" id="wPin" required class="input-field"></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="label-text">Passport Photo (1MB - 2MB)</label>
                            <input type="file" id="wPhoto" required accept="image/*" onchange="validateFile(this)" class="text-[10px] font-bold text-slate-400">
                            <p id="wPhotoError" class="file-error uppercase">File must be between 1MB and 2MB</p>
                        </div>
                        <div>
                            <label class="label-text">Aadhar Card Copy (1MB - 2MB)</label>
                            <input type="file" id="wAadharImg" required accept="image/*,application/pdf" onchange="validateFile(this)" class="text-[10px] font-bold text-slate-400">
                            <p id="wAadharError" class="file-error uppercase">File must be between 1MB and 2MB</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="label-text">Aadhar Number (12 Digits)</label>
                            <input type="number" id="wAadhar" required placeholder="0000 0000 0000" class="input-field">
                        </div>
                        <div>
                            <label class="label-text">Skill Certificate (Optional)</label>
                            <input type="file" id="wCert" accept="image/*,application/pdf" class="text-[10px] font-bold text-slate-400">
                        </div>
                    </div>

                    <div>
                        <label class="label-text">Create Password (Min 6 Characters)</label>
                        <input type="password" id="wPass" required minlength="6" placeholder="••••••" class="input-field">
                    </div>

                    <button type="submit" id="signupBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase tracking-widest text-xs shadow-xl hover:bg-blue-700 transition-all">
                        Submit for Admin Approval
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // File Validation Logic (1MB to 2MB)
        function validateFile(input) {
            const minSize = 1 * 1024 * 1024; // 1MB
            const maxSize = 2 * 1024 * 1024; // 2MB
            const errorElement = input.nextElementSibling;
            
            if (input.files.length > 0) {
                const fileSize = input.files[0].size;
                if (fileSize < minSize || fileSize > maxSize) {
                    errorElement.style.display = "block";
                    input.value = ""; // Clear the file
                } else {
                    errorElement.style.display = "none";
                }
            }
        }

        function switchTab(type) {
            if(type === 'login') {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('signupSection').classList.add('hidden');
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('signupTab').classList.remove('active');
            } else {
                document.getElementById('signupSection').classList.remove('hidden');
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('signupTab').classList.add('active');
                document.getElementById('loginTab').classList.remove('active');
            }
        }

        // Keep your existing Firebase and GPS logic from the previous turn...
        // Make sure to update the signup listener to ensure password is min 6 chars
    </script>
</body>
</html>
