<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Partner Portal - SmartSeva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .input-field { background: #ffffff; border: 2px solid #f1f5f9; border-radius: 12px; padding: 12px 16px; outline: none; transition: 0.3s; font-weight: 600; font-size: 0.85rem; width: 100%; color: #1e293b; }
        .input-field:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.05); }
        .label-text { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.05em; }
        .reg-card { border-radius: 2rem; background: #ffffff; box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; }
        .tab-btn { transition: 0.3s; border-bottom: 3px solid transparent; cursor: pointer; padding-bottom: 12px; }
        .tab-btn.active { border-color: #2563eb; color: #2563eb; }
        .file-error { color: #ef4444; font-size: 9px; font-weight: 800; margin-top: 4px; display: none; text-transform: uppercase; }
    </style>
</head>
<body class="min-h-screen py-10 px-4 flex flex-col items-center">

    <div class="max-w-3xl w-full">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-block">
                <div class="bg-blue-600 w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center mx-auto mb-3 text-white text-xl font-black">S</div>
                <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Smart<span class="text-blue-600">Seva</span></h1>
                <p class="text-[9px] font-black text-blue-500 uppercase tracking-[0.3em]">Expert Partnership Portal</p>
            </a>
        </div>

        <div class="reg-card p-8 md:p-12 relative">
            <div class="flex gap-8 mb-10 border-b border-gray-100">
                <button id="loginTab" onclick="switchTab('login')" class="tab-btn active font-bold uppercase text-xs tracking-widest">Login</button>
                <button id="signupTab" onclick="switchTab('signup')" class="tab-btn font-bold uppercase text-xs tracking-widest text-gray-400">Join as Expert</button>
            </div>

            <div id="loginSection" class="space-y-6">
                <h2 class="text-xl font-black text-slate-900 uppercase mb-6">Expert Login</h2>
                <form id="workerLoginForm" class="space-y-5">
                    <div>
                        <label class="label-text">Phone Number</label>
                        <input type="tel" id="lPhone" required placeholder="Registered Mobile" class="input-field">
                    </div>
                    <div>
                        <label class="label-text">Password</label>
                        <input type="password" id="lPass" required placeholder="••••••" class="input-field">
                    </div>
                    <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase text-xs tracking-widest hover:bg-blue-600 transition shadow-xl">Login to Dashboard</button>
                </form>
            </div>

            <div id="signupSection" class="hidden space-y-6">
                <h2 class="text-xl font-black text-slate-900 uppercase mb-6 border-b pb-4">Professional Registration</h2>
                <form id="workerSignupForm" class="space-y-6">
                    
                    <button type="button" onclick="getLocation()" id="gpsBtn" class="w-full bg-blue-50 text-blue-600 py-4 rounded-xl font-black text-[11px] uppercase border-2 border-blue-600/10 hover:bg-blue-600 hover:text-white transition">
                        <i class="fas fa-location-crosshairs mr-2"></i> Detect Service Area (Auto-Fill Address)
                    </button>
                    <input type="hidden" id="wCoords">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="label-text">Full Name</label><input type="text" id="wName" required class="input-field"></div>
                        <div><label class="label-text">Father's Name</label><input type="text" id="wFather" required class="input-field"></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="label-text">Category</label>
                            <select id="wCategory" required class="input-field">
                                <option value="electrician">Electrician</option>
                                <option value="plumber">Plumber</option>
                                <option value="cleaning">Cleaning</option>
                                <option value="repairing">Repairing</option>
                            </select>
                        </div>
                        <div><label class="label-text">Experience (Years)</label><input type="number" id="wExp" required class="input-field"></div>
                        <div><label class="label-text">Phone Number</label><input type="tel" id="wPhone" required class="input-field"></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div><label class="label-text">State</label><input type="text" id="wState" required class="input-field" placeholder="Auto-filled"></div>
                        <div><label class="label-text">District</label><input type="text" id="wDistrict" required class="input-field" placeholder="Auto-filled"></div>
                        <div><label class="label-text">Pincode</label><input type="text" id="wPin" required class="input-field" placeholder="Auto-filled"></div>
                    </div>

                    <div><label class="label-text">Detailed Address</label><textarea id="wAddr" required class="input-field h-20 resize-none" placeholder="Auto-filled full address"></textarea></div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="label-text">Passport Photo (1MB - 2MB)</label>
                            <input type="file" id="wPhoto" required accept="image/*" onchange="validateFile(this)" class="text-[10px] font-bold text-slate-400">
                            <p class="file-error">File size must be 1MB to 2MB</p>
                        </div>
                        <div>
                            <label class="label-text">Aadhar Card Copy (1MB - 2MB)</label>
                            <input type="file" id="wAadharImg" required accept="image/*" onchange="validateFile(this)" class="text-[10px] font-bold text-slate-400">
                            <p class="file-error">File size must be 1MB to 2MB</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="label-text">Aadhar Number</label><input type="number" id="wAadharNum" required class="input-field"></div>
                        <div><label class="label-text">Skill Certificate (Optional)</label><input type="file" id="wCert" accept="image/*,application/pdf" class="text-[10px] font-bold text-slate-400"></div>
                    </div>

                    <div><label class="label-text">Create Password (Min 6 Characters)</label><input type="password" id="wPass" required minlength="6" class="input-field"></div>

                    <button type="submit" id="signupBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-xs tracking-widest shadow-xl hover:bg-blue-700 transition">Submit Profile for Approval</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 1. Tab Switch
        function switchTab(type) {
            document.getElementById('loginSection').classList.toggle('hidden', type === 'signup');
            document.getElementById('signupSection').classList.toggle('hidden', type === 'login');
            document.getElementById('loginTab').classList.toggle('active', type === 'login');
            document.getElementById('signupTab').classList.toggle('active', type === 'signup');
        }

        // 2. File Validation (1MB to 2MB)
        function validateFile(input) {
            const file = input.files[0];
            const error = input.nextElementSibling;
            if (file) {
                const sizeInMB = file.size / (1024 * 1024);
                if (sizeInMB < 1 || sizeInMB > 2) {
                    error.style.display = "block";
                    input.value = ""; 
                } else {
                    error.style.display = "none";
                }
            }
        }

        // 3. AUTO GPS & ADDRESS FETCH
        async function fetchAddress(lat, lon) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
                const data = await response.json();
                if (data.address) {
                    const addr = data.address;
                    document.getElementById('wState').value = addr.state || "";
                    document.getElementById('wDistrict').value = addr.district || addr.city || addr.county || "";
                    document.getElementById('wPin').value = addr.postcode || "";
                    document.getElementById('wAddr').value = data.display_name || "";
                    return true;
                }
            } catch (err) {
                console.error(err);
                return false;
            }
        }

        function getLocation() {
            const btn = document.getElementById('gpsBtn');
            btn.innerText = "Accessing GPS...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    document.getElementById('wCoords').value = `${lat},${lon}`;
                    
                    const success = await fetchAddress(lat, lon);
                    if(success) {
                        btn.innerHTML = `<i class="fas fa-check-circle mr-2"></i> Location Auto-Filled`;
                        btn.className = "w-full bg-green-50 text-green-600 py-4 rounded-xl font-black text-[11px] uppercase border-2 border-green-600/20";
                    } else {
                        btn.innerText = "GPS Fixed, but Address failed. Try again.";
                    }
                }, () => {
                    alert("Please allow Location Permission in your browser settings.");
                    btn.innerText = "Detect Service Area (Auto-Fill Address)";
                });
            }
        }
    </script>
</body>
</html>
