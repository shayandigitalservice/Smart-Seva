<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Pro Dashboard - SmartSeva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .tab-btn.active { background: #2563eb !important; color: white !important; box-shadow: 0 12px 20px -5px rgba(37, 99, 235, 0.4); }
        .stat-card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; }
        .booking-card { background: white; border-radius: 32px; border: 1px solid #e2e8f0; transition: 0.3s; }
        .booking-card:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .online-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; position: relative; }
        .online-dot::after { content: ''; position: absolute; inset: 0; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-slate-950 text-white p-5 sticky top-0 z-[100] shadow-2xl">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 w-10 h-10 rounded-2xl flex items-center justify-center font-black text-xl shadow-lg shadow-blue-600/30">S</div>
                <div>
                    <h1 class="text-lg font-black tracking-tighter uppercase leading-none">Smart<span class="text-blue-500">Seva</span></h1>
                    <p class="text-[8px] font-black text-slate-500 uppercase tracking-[0.2em] mt-1">Expert Console</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-slate-900 px-3 py-1.5 rounded-full border border-slate-800">
                    <div class="online-dot"></div>
                    <span class="text-[9px] font-black uppercase tracking-widest text-slate-300">Live</span>
                </div>
                <button onclick="logout()" class="text-slate-400 hover:text-red-500 transition text-xl"><i class="fas fa-power-off"></i></button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-2xl">
        
        <section class="mb-10">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 class="text-3xl font-black text-slate-900 tracking-tight">Namaste, <span id="workerName" class="text-blue-600">Expert</span></h2>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.15em] mt-1 italic">Aapka aaj ka business summary</p>
                </div>
                <div class="w-14 h-14 bg-white rounded-2xl border border-slate-200 flex items-center justify-center shadow-sm">
                    <i class="fas fa-user-circle text-slate-300 text-3xl"></i>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="stat-card border-b-4 border-blue-500">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Jobs Completed</p>
                    <h3 id="stat-done" class="text-3xl font-black text-slate-800 mt-1">0</h3>
                </div>
                <div class="stat-card border-b-4 border-green-500">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Today's Revenue</p>
                    <h3 class="text-3xl font-black text-slate-800 mt-1">₹<span id="stat-earning">0</span></h3>
                </div>
            </div>
        </section>

        <div class="flex gap-2 mb-8 bg-slate-100 p-1.5 rounded-[2rem]">
            <button onclick="filterBookings('pending', this)" class="tab-btn active flex-1 py-4 rounded-[1.8rem] font-black text-[10px] uppercase transition-all">New Leads</button>
            <button onclick="filterBookings('approved', this)" class="tab-btn flex-1 py-4 rounded-[1.8rem] font-black text-[10px] uppercase transition-all">Active Jobs</button>
        </div>

        <div id="bookingContainer" class="space-y-6">
            <div class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-600 mb-4"></div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Searching for requests...</p>
            </div>
        </div>
    </main>

    <script>
        const workerLocal = JSON.parse(localStorage.getItem("smartSevaWorker"));
        if (!workerLocal) { window.location.href = "partner.html"; }

        // Firebase Initialization
        const firebaseConfig = {
            apiKey: "AIzaSyDWRwmMzdLlWLhdf6KQL4iQi1VHx7uVwXQ",
            authDomain: "smart-seva-5bef9.firebaseapp.com",
            projectId: "smart-seva-5bef9",
            storageBucket: "smart-seva-5bef9.firebasestorage.app",
            messagingSenderId: "1042547190403",
            appId: "1:1042547190403:web:15ea1659a88bdf3621c9b6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentFilter = 'pending';

        // Check Account Validity
        async function checkWorkerStatus() {
            const doc = await db.collection("workers").doc(workerLocal.id).get();
            if (!doc.exists || doc.data().status !== 'active') {
                alert("Account Not Authorized. Contact Admin.");
                logout();
            } else {
                document.getElementById('workerName').innerText = doc.data().name.split(' ')[0];
            }
        }

        // Load & Sync Stats
        function syncStats() {
            db.collection("bookings").where("workerId", "==", workerLocal.id)
              .onSnapshot(snap => {
                  let done = 0;
                  let cash = 0;
                  snap.forEach(doc => {
                      if(doc.data().status === 'completed') {
                          done++;
                          cash += 500; // Assuming 500 per job for demo
                      }
                  });
                  document.getElementById('stat-done').innerText = done;
                  document.getElementById('stat-earning').innerText = cash;
              });
        }

        // Main Job Loader
        function loadJobs() {
            db.collection("bookings")
              .where("workerId", "==", workerLocal.id)
              .orderBy("timestamp", "desc")
              .onSnapshot(snap => {
                  const container = document.getElementById('bookingContainer');
                  container.innerHTML = "";
                  
                  const filtered = snap.docs.filter(d => d.data().status === currentFilter);

                  if(filtered.length === 0) {
                      container.innerHTML = `
                        <div class="text-center py-20 bg-white rounded-[2.5rem] border-2 border-dashed border-slate-100">
                            <i class="fas fa-mug-hot text-slate-200 text-4xl mb-4"></i>
                            <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Aaram karo, koi naya kaam nahi hai</p>
                        </div>`;
                      return;
                  }

                  filtered.forEach(doc => {
                      const b = doc.data();
                      const id = doc.id;
                      
                      container.innerHTML += `
                        <div class="booking-card p-6 relative overflow-hidden">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <div class="flex items-center gap-2">
                                        <span class="text-[8px] font-black bg-slate-100 px-2 py-1 rounded-md uppercase tracking-widest">${b.service}</span>
                                        ${currentFilter === 'approved' ? '<span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>' : ''}
                                    </div>
                                    <h4 class="text-xl font-black text-slate-900 mt-2">${b.customerName}</h4>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase mt-1"><i class="far fa-calendar-check mr-1"></i> ${b.serviceDate}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[8px] font-black text-slate-400 uppercase">Potential Pay</p>
                                    <p class="text-lg font-black text-green-600 tracking-tighter">₹500.00</p>
                                </div>
                            </div>

                            <div class="bg-slate-50/50 p-5 rounded-2xl mb-6 border border-slate-100/50">
                                <div class="flex gap-4 items-start mb-4">
                                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm text-blue-500"><i class="fas fa-map-marked-alt"></i></div>
                                    <div>
                                        <p class="text-[8px] font-black text-slate-400 uppercase">Service Location</p>
                                        <p class="text-xs font-bold text-slate-700 leading-tight mt-1">${b.customerAddress}</p>
                                    </div>
                                </div>
                                <div class="flex gap-4 items-start">
                                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm text-orange-400"><i class="fas fa-quote-left"></i></div>
                                    <div>
                                        <p class="text-[8px] font-black text-slate-400 uppercase">Customer Note</p>
                                        <p class="text-xs italic text-slate-500 font-medium mt-1">"${b.userMsg || 'Standard Service Requested'}"</p>
                                    </div>
                                </div>
                            </div>

                            <div class="flex gap-3">
                                ${currentFilter === 'pending' ? `
                                    <button onclick="updateStatus('${id}', 'approved')" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-xl shadow-blue-600/20 hover:scale-[1.02] active:scale-95 transition">Accept Lead</button>
                                    <button onclick="updateStatus('${id}', 'rejected')" class="px-6 bg-slate-100 text-slate-400 py-4 rounded-2xl font-black text-[11px] uppercase transition">Ignore</button>
                                ` : `
                                    <a href="tel:${b.customerPhone}" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black text-[11px] uppercase text-center shadow-xl shadow-slate-900/20"><i class="fas fa-phone-alt mr-2"></i> Call Now</a>
                                    <a href="https://wa.me/91${b.customerPhone}" class="w-14 h-14 bg-green-500 text-white rounded-2xl flex items-center justify-center text-xl shadow-xl shadow-green-500/20"><i class="fab fa-whatsapp"></i></a>
                                    <button onclick="updateStatus('${id}', 'completed')" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black text-[11px] uppercase shadow-xl shadow-blue-600/20">End Job</button>
                                `}
                            </div>
                        </div>`;
                  });
              });
        }

        function filterBookings(status, btn) {
            currentFilter = status;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadJobs();
        }

        async function updateStatus(id, newStatus) {
            if(confirm(`Nischit hai? Status: ${newStatus}`)) {
                await db.collection("bookings").doc(id).update({ status: newStatus });
            }
        }

        function logout() {
            localStorage.removeItem("smartSevaWorker");
            window.location.href = "partner.html";
        }

        // Start Everything
        checkWorkerStatus();
        syncStats();
        loadJobs();
    </script>
</body>
</html>
