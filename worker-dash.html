<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Dashboard - SmartSeva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .booking-card { transition: all 0.3s ease; }
        .status-badge { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 99px; text-transform: uppercase; }
    </style>
</head>
<body class="pb-20">

    <div class="bg-slate-950 text-white p-6 shadow-2xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="bg-blue-600 w-8 h-8 rounded-lg flex items-center justify-center font-black italic">S</div>
                <h1 class="text-xl font-black italic tracking-tighter">Worker Hub</h1>
            </div>
            <button onclick="logout()" class="text-xs font-bold uppercase text-red-400">Logout</button>
        </div>
    </div>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-8">
            <h2 class="text-2xl font-black text-slate-800">Hello, <span id="workerName" class="text-blue-600">Expert</span>!</h2>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Aapke aaj ke kaam ki list</p>
        </div>

        <div class="flex space-x-4 mb-8">
            <button onclick="filterBookings('pending')" class="bg-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-sm hover:bg-blue-600 hover:text-white transition">New Requests</button>
            <button onclick="filterBookings('approved')" class="bg-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-sm hover:bg-green-600 hover:text-white transition">Accepted</button>
        </div>

        <div id="bookingContainer" class="space-y-6">
            <p class="text-center py-20 font-bold text-slate-400 animate-pulse uppercase text-xs">Checking for new jobs...</p>
        </div>
    </main>

    <script>
        // 1. Worker Login Check
        const workerData = JSON.parse(localStorage.getItem("smartSevaWorker"));
        if (!workerData) {
            alert("Aapka login session expire ho gaya hai!");
            window.location.href = "partner.html";
        } else {
            document.getElementById('workerName').innerText = workerData.name;
        }

        // 2. Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyDWRwmMzdLlWLhdf6KQL4iQi1VHx7uVwXQ",
            authDomain: "smart-seva-5bef9.firebaseapp.com",
            projectId: "smart-seva-5bef9",
            storageBucket: "smart-seva-5bef9.firebasestorage.app",
            messagingSenderId: "1042547190403",
            appId: "1:1042547190403:web:15ea1659a88bdf3621c9b6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 3. Fetch Bookings Real-time
        let currentStatusFilter = 'pending';

        function loadBookings() {
            db.collection("bookings")
              .where("workerId", "==", workerData.id)
              .onSnapshot(snap => {
                  const container = document.getElementById('bookingContainer');
                  container.innerHTML = "";
                  
                  const filteredDocs = snap.docs.filter(doc => doc.data().status === currentStatusFilter);

                  if (filteredDocs.length === 0) {
                      container.innerHTML = `<div class="text-center py-20 bg-white rounded-[2rem] border-2 border-dashed border-slate-200">
                        <i class="fas fa-folder-open text-slate-200 text-5xl mb-4"></i>
                        <p class="font-black text-slate-300 uppercase italic">No ${currentStatusFilter} requests found</p>
                      </div>`;
                      return;
                  }

                  filteredDocs.forEach(doc => {
                      const b = doc.data();
                      const id = doc.id;
                      const statusColor = b.status === 'pending' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600';

                      container.innerHTML += `
                        <div class="booking-card bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 relative overflow-hidden">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="status-badge ${statusColor}">${b.status}</span>
                                    <h4 class="text-xl font-black text-slate-800 mt-2">${b.customerName}</h4>
                                    <p class="text-[10px] font-black text-blue-600 uppercase"><i class="fas fa-calendar-alt mr-1"></i> Requested: ${b.serviceDate}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] font-black text-slate-400 uppercase">Service</p>
                                    <p class="text-sm font-black text-slate-800 uppercase italic">${b.service}</p>
                                </div>
                            </div>

                            <div class="bg-slate-50 p-4 rounded-2xl mb-6 space-y-3">
                                <p class="text-xs font-bold text-slate-600"><i class="fas fa-map-marker-alt text-red-500 mr-2"></i> ${b.customerAddress}</p>
                                <p class="text-xs font-bold text-slate-600"><i class="fas fa-phone-alt text-blue-500 mr-2"></i> ${b.customerPhone}</p>
                                <p class="text-xs italic text-slate-400 font-medium">"${b.userMsg || 'No special instructions'}"</p>
                            </div>

                            <div class="flex gap-3">
                                ${b.status === 'pending' ? `
                                    <button onclick="updateStatus('${id}', 'approved')" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg hover:bg-green-700 transition">Approve</button>
                                    <button onclick="updateStatus('${id}', 'rejected')" class="bg-red-50 text-red-500 px-6 rounded-2xl font-black text-xs uppercase transition">Reject</button>
                                ` : `
                                    <a href="https://wa.me/91${b.customerPhone}?text=Hello%20${b.customerName},%20SmartSeva%20worker%20here." class="flex-1 bg-green-500 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest text-center shadow-lg"><i class="fab fa-whatsapp mr-2 text-sm"></i> WhatsApp User</a>
                                    <button onclick="updateStatus('${id}', 'completed')" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg">Job Finished</button>
                                `}
                            </div>
                        </div>
                      `;
                  });
              });
        }

        function filterBookings(status) {
            currentStatusFilter = status;
            loadBookings();
        }

        async function updateStatus(id, newStatus) {
            if(confirm(`Kya aap is booking ko ${newStatus} karna chahte hain?`)) {
                await db.collection("bookings").doc(id).update({ status: newStatus });
                alert(`Booking ${newStatus}!`);
            }
        }

        function logout() {
            localStorage.removeItem("smartSevaWorker");
            window.location.href = "partner.html";
        }

        // Initial Load
        loadBookings();
    </script>
</body>
</html>
